      parts.push('<rect x="'+leftX+'" y="'+(topY+leftHeaderH/2)+'" width="'+boxW+'" height="'+(leftHeaderH/2)+'" fill="'+C.headerFill+'"/>');
      parts.push('<text x="'+(leftX+boxW/2)+'" y="'+(topY+16)+'" text-anchor="middle" font-size="14" font-weight="700" fill="'+C.textPrimary+'">'+escapeHtml(left.desig)+'</text>');
      var leftModuleName = leftProps.Device_name || getPrefixName(left.desig);
      var leftValue = leftProps.Value || '';
      var leftDisplayName = leftValue ? leftModuleName + ' ' + leftValue : leftModuleName;
      parts.push('<text x="'+(leftX+boxW/2)+'" y="'+(topY+28)+'" text-anchor="middle" font-size="10" fill="'+C.textSecondary+'">'+escapeHtml(leftDisplayName)+'</text>');
      var leftSpec = leftProps['Manufacturer Part'] || '';
      if (leftSpec) {
        parts.push('<text x="'+(leftX+boxW/2)+'" y="'+(topY+40)+'" text-anchor="middle" font-size="9" fill="'+C.textMuted+'">'+escapeHtml(leftSpec)+'</text>');
      }

      // 左侧引脚
      var leftPins = Object.keys(left.pins).sort(function(a,b){var na=parseInt(a),nb=parseInt(b);if(!isNaN(na)&&!isNaN(nb))return na-nb;return a.localeCompare(b);});
      var leftPinStartY = topY + leftHeaderH + 13;
      for (var i = 0; i < leftPins.length; i++) {
        var pn = leftPins[i];
        var py = leftPinStartY + i * pinH;
        var pinData = left.pins[pn] || {};
        var pinNet = pinData.net || '';
        var pinLabel = pinData.pinName || pinData.name || inferSignalName(pinNet);
        parts.push('<circle cx="'+(leftX+boxW)+'" cy="'+py+'" r="5" fill="'+C.pinFill+'" stroke="'+C.pinStroke+'" stroke-width="1.5"/>');
        parts.push('<text x="'+(leftX+boxW-12)+'" y="'+(py+4)+'" text-anchor="end" font-size="11" font-weight="600" fill="'+C.textSecondary+'">'+escapeHtml(pn)+'</text>');
        parts.push('<text x="'+(leftX+12)+'" y="'+(py+4)+'" text-anchor="start" font-size="10" fill="'+C.textMuted+'">'+escapeHtml(pinLabel)+'</text>');
      }

      // 绘制右侧连接器
      var rightProps = right.props || {};
      parts.push('<rect x="'+rightX+'" y="'+topY+'" width="'+boxW+'" height="'+rightBoxH+'" rx="6" fill="'+C.boxFill+'" stroke="'+C.boxStroke+'" stroke-width="2"/>');
      parts.push('<rect x="'+rightX+'" y="'+topY+'" width="'+boxW+'" height="'+rightHeaderH+'" rx="6" fill="'+C.headerFill+'"/>');
      parts.push('<rect x="'+rightX+'" y="'+(topY+rightHeaderH/2)+'" width="'+boxW+'" height="'+(rightHeaderH/2)+'" fill="'+C.headerFill+'"/>');
      parts.push('<text x="'+(rightX+boxW/2)+'" y="'+(topY+16)+'" text-anchor="middle" font-size="14" font-weight="700" fill="'+C.textPrimary+'">'+escapeHtml(right.desig)+'</text>');
      var rightModuleName = rightProps.Device_name || getPrefixName(right.desig);
      var rightValue = rightProps.Value || '';
      var rightDisplayName = rightValue ? rightModuleName + ' ' + rightValue : rightModuleName;
      parts.push('<text x="'+(rightX+boxW/2)+'" y="'+(topY+28)+'" text-anchor="middle" font-size="10" fill="'+C.textSecondary+'">'+escapeHtml(rightDisplayName)+'</text>');
      var rightSpec = rightProps['Manufacturer Part'] || '';
      if (rightSpec) {
        parts.push('<text x="'+(rightX+boxW/2)+'" y="'+(topY+40)+'" text-anchor="middle" font-size="9" fill="'+C.textMuted+'">'+escapeHtml(rightSpec)+'</text>');
      }

      // 右侧引脚
      var rightPins = Object.keys(right.pins).sort(function(a,b){var na=parseInt(a),nb=parseInt(b);if(!isNaN(na)&&!isNaN(nb))return na-nb;return a.localeCompare(b);});
      var rightPinStartY = topY + rightHeaderH + 13;
      for (var i = 0; i < rightPins.length; i++) {
        var pn = rightPins[i];
        var py = rightPinStartY + i * pinH;
        var pinData = right.pins[pn] || {};
        var pinNet = pinData.net || '';
        var pinLabel = pinData.pinName || pinData.name || inferSignalName(pinNet);
        parts.push('<circle cx="'+rightX+'" cy="'+py+'" r="5" fill="'+C.pinFill+'" stroke="'+C.pinStroke+'" stroke-width="1.5"/>');
        parts.push('<text x="'+(rightX+12)+'" y="'+(py+4)+'" text-anchor="start" font-size="11" font-weight="600" fill="'+C.textSecondary+'">'+escapeHtml(pn)+'</text>');
        parts.push('<text x="'+(rightX+boxW-12)+'" y="'+(py+4)+'" text-anchor="end" font-size="10" fill="'+C.textMuted+'">'+escapeHtml(pinLabel)+'</text>');
      }
      
      // 定义颜色
      var colors = {
        power: '#dc2626',
        gnd: '#6b7280',
        signal: '#16a34a'
      };

      // 判断是否直接相连（实线渲染）
      function isDirectConnection(edgeType) {
        return !edgeType || edgeType === EDGE_TYPES.DIRECT ||
               edgeType === EDGE_TYPES.THROUGH_L ||
               edgeType === EDGE_TYPES.THROUGH_FB ||
               edgeType === EDGE_TYPES.THROUGH_FUSE ||
               edgeType === EDGE_TYPES.THROUGH_R_LOW;
      }

      // 获取条件相连的描述
      function getConditionalLabel(edgeType, value) {
        if (!edgeType) return '';
        if (edgeType === EDGE_TYPES.BLOCKED_BY_C) return t('condBlockedByC');
        if (edgeType === EDGE_TYPES.CONDITIONAL_BY_DIODE) return t('condByDiode');
        if (edgeType === EDGE_TYPES.CONDITIONAL_BY_DIODE_DIR) return t('condByDiodeDir');
        if (edgeType === EDGE_TYPES.CONDITIONAL_BY_MOSFET) return t('condByMosfet');
        if (edgeType === EDGE_TYPES.CONDITIONAL_BY_BJT) return t('condByBjt');
        if (edgeType === EDGE_TYPES.ISOLATED_BY_TRANSFORMER) return t('condByTransformer');
        if (edgeType === EDGE_TYPES.ISOLATED_BY_OPTO) return t('condByOpto');
        if (edgeType === EDGE_TYPES.STOP_AT_IC) return t('condByIc');
        if (edgeType === EDGE_TYPES.THROUGH_R) return t('condByR') + '(' + (value || '') + ')';
        if (edgeType === EDGE_TYPES.THROUGH_R_LOW) return t('condByRLow') + '(' + (value || '') + ')';
        return t('condConnected');
      }

      // 为每个网络生成唯一颜色
      var netColorMap = {};
      var colorPalette = [
        '#16a34a', '#0891b2', '#7c3aed', '#db2777', '#ea580c',
        '#8b5cf6', '#06b6d4', '#f59e0b', '#ec4899', '#6366f1',
        '#14b8a6', '#a855f7', '#f97316', '#0ea5e9', '#84cc16',
        '#e11d48', '#2563eb', '#9333ea', '#059669', '#d97706'
      ];
      var colorIndex = 0;
      function getNetColor(netName, netType) {
        if (netType === 'power') return colors.power;
        if (netType === 'gnd') return colors.gnd;
        if (!netName) return colors.signal;
        if (!netColorMap[netName]) {
          netColorMap[netName] = colorPalette[colorIndex % colorPalette.length];
          colorIndex++;
        }
        return netColorMap[netName];
      }

      // 分类连接：按网络类型分类（仅显示直接连接）
      var powerConnections = [];
      var gndConnections = [];
      var signalConnections = [];

      for (var mi = 0; mi < mapping.length; mi++) {
        var conn = mapping[mi];
        // 过滤：跳过条件相连的连接，只显示直接连接
        if (!isDirectConnection(conn.edgeType)) {
          continue;
        }
        var netType = conn.netType || 'signal';
        if (netType === 'gnd') {
          gndConnections.push(conn);
        } else if (netType === 'power') {
          powerConnections.push(conn);
        } else {
          signalConnections.push(conn);
        }
      }

      // 绘制所有连线（统一函数）
      function drawConnection(conn, lineColor, netTypeAttr) {
        var leftIdx = leftPins.indexOf(String(conn.leftPin));
        var rightIdx = rightPins.indexOf(String(conn.rightPin));
        if (leftIdx < 0 || rightIdx < 0) return;

        var y1 = leftPinStartY + leftIdx * pinH;
        var y2 = rightPinStartY + rightIdx * pinH;
        var x1 = leftX + boxW;
        var x2 = rightX;
        var midX = (x1 + x2) / 2;
        var midY = (y1 + y2) / 2;
        var nt = ' data-net-type="' + netTypeAttr + '"';
        var isDirect = isDirectConnection(conn.edgeType);
        var netLabel = conn.net || conn.leftNet || '';
        var netName = conn.net || conn.leftNet || '';
        var netColor = getNetColor(netName, netTypeAttr);

        if (isDirect) {
          // 实线连接
          parts.push('<line'+nt+' x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+netColor+'" stroke-width="2" opacity="0.7"/>');
          parts.push('<text'+nt+' x="'+midX+'" y="'+(midY-12)+'" text-anchor="middle" font-size="9" fill="'+netColor+'">'+escapeHtml(netLabel)+'</text>');
        } else {
          // 条件性连接：虚线 + 标注
          var condLabel = getConditionalLabel(conn.edgeType, conn.value || '');
          parts.push('<line'+nt+' x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+netColor+'" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>');
          parts.push('<text'+nt+' x="'+midX+'" y="'+(midY-12)+'" text-anchor="middle" font-size="9" fill="'+netColor+'" font-weight="600">'+t('condConnected')+' ('+condLabel+')</text>');
          parts.push('<text'+nt+' x="'+midX+'" y="'+(midY+14)+'" text-anchor="middle" font-size="8" fill="'+C.textMuted+'">'+escapeHtml(netLabel)+'</text>');
        }
      }

      // 绘制 GND 连线
      for (var gi = 0; gi < gndConnections.length; gi++) {
        drawConnection(gndConnections[gi], colors.gnd, 'gnd');
      }

      // 绘制电源连线
      for (var pi = 0; pi < powerConnections.length; pi++) {
        drawConnection(powerConnections[pi], colors.power, 'power');
      }

      // 绘制信号连线
      for (var si = 0; si < signalConnections.length; si++) {
        drawConnection(signalConnections[si], colors.signal, 'signal');
      }

      parts.push('</svg>');
      return parts.join('');
    }

    // 引脚映射缩放/平移
    var pmZoom = 100, pmPanX = 0, pmPanY = 0, pmDragging = false, pmLastX, pmLastY;
    var pmRafPending = false;
    var pmNetTypeFilter = { all: false, power: true, gnd: false, signal: true };

    function applyPinMappingFilter() {
      var canvas = document.getElementById('mapping-canvas');
      if (!canvas) return;
      var all = pmNetTypeFilter.all;
      canvas.querySelectorAll('[data-net-type]').forEach(function(el) {
        var t = el.getAttribute('data-net-type');
        var show = all || !!pmNetTypeFilter[t];
        el.style.visibility = show ? '' : 'hidden';
      });
    }

    // 初始化按钮状态
    document.querySelectorAll('.ntf-btn').forEach(function(b) {
      b.classList.toggle('active', !!pmNetTypeFilter[b.dataset.type]);
    });

    document.querySelectorAll('.ntf-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var type = btn.dataset.type;
        if (type === 'all') {
          pmNetTypeFilter = { all: true, power: false, gnd: false, signal: false };
        } else {
          pmNetTypeFilter.all = false;
          pmNetTypeFilter[type] = !pmNetTypeFilter[type];
          if (!pmNetTypeFilter.power && !pmNetTypeFilter.gnd && !pmNetTypeFilter.signal) {
            pmNetTypeFilter.all = true;
          }
        }
        document.querySelectorAll('.ntf-btn').forEach(function(b) {
          b.classList.toggle('active', !!pmNetTypeFilter[b.dataset.type]);
        });
        applyPinMappingFilter();
      });
    });

    function updatePmTransform(smooth) {
      var canvas = document.getElementById('mapping-canvas');
      if (canvas) {
        if (smooth) {
          canvas.classList.add('smooth-transition');
        } else {
          canvas.classList.remove('smooth-transition');
        }
        canvas.style.transform = 'translate3d('+pmPanX+'px,'+pmPanY+'px,0) scale('+(pmZoom/100)+')';
      }
      var level = document.getElementById('pm-zoom-level');
      if (level) level.textContent = Math.round(pmZoom) + '%';
    }

    function schedulePmTransformUpdate() {
      if (pmRafPending) return;
      pmRafPending = true;
      requestAnimationFrame(function() {
        pmRafPending = false;
        updatePmTransform(false);
      });
    }

    function centerPinMapping() {
      var viewport = document.getElementById('mapping-viewport');
      var svg = document.querySelector('#mapping-canvas svg');
      if (!viewport || !svg) { updatePmTransform(); return; }
      var vpW = viewport.clientWidth;
      var vpH = viewport.clientHeight;
      var svgW = parseFloat(svg.getAttribute('width')) || 0;
      var svgH = parseFloat(svg.getAttribute('height')) || 0;
      if (svgW) {
        pmPanX = (vpW - svgW * pmZoom / 100) / 2;
        pmPanY = 0;
      }
      updatePmTransform(true);
    }

    function populatePairSelector(pairs, graph) {
      window._pmPairs = pairs;
      window._pmGraph = graph;
      
      // 收集所有独立器件
      var devices = {};
      for (var i = 0; i < pairs.length; i++) {
        var left = pairs[i].left;
        var right = pairs[i].right;
        if (left && left.desig) {
          if (!devices[left.desig]) {
            devices[left.desig] = { desig: left.desig, type: left.type, pinCount: Object.keys(left.pins || {}).length };
          }
        }
        if (right && right.desig) {
          if (!devices[right.desig]) {
            devices[right.desig] = { desig: right.desig, type: right.type, pinCount: Object.keys(right.pins || {}).length };
          }
        }
      }
      
      // 填充器件选择下拉框
      var deviceSelect = document.getElementById('device-select');
      var deviceList = Object.keys(devices).sort();
      deviceSelect.innerHTML = '<option value="">' + t('selectDevice') + '</option>';
      for (var i = 0; i < deviceList.length; i++) {
        var d = devices[deviceList[i]];
        var opt = document.createElement('option');
        opt.value = d.desig;
        opt.textContent = d.desig + ' (' + d.pinCount + ' pins)';
        deviceSelect.appendChild(opt);
      }
      
      // 填充连接器对选择下拉框（默认显示全部）
      var pairSelect = document.getElementById('connector-pair-select');
      pairSelect.innerHTML = '<option value="">' + t('selectPair') + '</option>';
      for (var i = 0; i < pairs.length; i++) {
        var opt = document.createElement('option');
        opt.value = i;
        opt.textContent = pairs[i].displayName + ' (' + pairs[i].sharedCount + ')';
        pairSelect.appendChild(opt);
      }
      pairSelect.disabled = false;
      
      // 器件选择变化时更新连接器对
      deviceSelect.addEventListener('change', function() {
        var selectedDevice = this.value;
        pairSelect.innerHTML = '<option value="">' + t('selectPair') + '</option>';
        
        if (!selectedDevice) {
          // 显示全部
          for (var i = 0; i < pairs.length; i++) {
            var opt = document.createElement('option');
            opt.value = i;
            opt.textContent = pairs[i].displayName + ' (' + pairs[i].sharedCount + ')';
            pairSelect.appendChild(opt);
          }
        } else {
          // 只显示与选中器件相关的配对
          for (var i = 0; i < pairs.length; i++) {
            var left = pairs[i].left;
            var right = pairs[i].right;
            if ((left && left.desig === selectedDevice) || (right && right.desig === selectedDevice)) {
              var opt = document.createElement('option');
              opt.value = i;
              opt.textContent = pairs[i].displayName + ' (' + pairs[i].sharedCount + ')';
              pairSelect.appendChild(opt);
            }
          }
        }
});
       
      // 防抖渲染变量
      var renderTimeout = null;
      var lastRenderIdx = null;
      
      // 连接器对选择变化时渲染（防抖+分块渲染优化）
      pairSelect.addEventListener('change', function() {
        var idx = parseInt(this.value);
        
        // 清除之前的渲染任务（防抖）
        if (renderTimeout) {
          clearTimeout(renderTimeout);
        }
        
        // 如果点击同一个，不渲染
        if (isNaN(idx) || !pairs[idx] || idx === lastRenderIdx) {
          return;
        }
        
        var canvas = document.getElementById('mapping-canvas');
        canvas.innerHTML = '<div style="padding:20px;text-align:center;color:#6b7280;">'+t('rendering')+'</div>';
        
        // 防抖延迟100ms后渲染
        renderTimeout = setTimeout(function() {
          try {
            lastRenderIdx = idx;
            var svg = renderPinMappingSVG(pairs[idx], graph);
            canvas.innerHTML = svg;
            
            // 延迟应用筛选
            setTimeout(function() {
              applyPinMappingFilter();
              pmZoom = 100;
              centerPinMapping();
            }, 50);
          } catch(e) {
            console.error('Render error on select:', e);
            canvas.innerHTML = '<div style="padding:40px;text-align:center;color:#dc2626;">'+t('renderFailed')+' ' + escapeHtml(e.message) + '</div>';
          }
        }, 100);
      });
    }

    // Pin mapping viewport events
    var pmViewport = document.getElementById('mapping-viewport');
    var pmCanvas = document.getElementById('mapping-canvas');
    if (pmCanvas) {
      pmCanvas.addEventListener('transitionend', function() {
        pmCanvas.classList.remove('smooth-transition');
      });
    }
    if (pmViewport) {
      pmViewport.addEventListener('wheel', function(e) {
        e.preventDefault();

        var rect = pmViewport.getBoundingClientRect();
        var mouseX = e.clientX - rect.left;
        var mouseY = e.clientY - rect.top;

        var oldScale = pmZoom / 100;
        var delta = e.deltaY > 0 ? -0.05 : 0.05;
        var newScale = Math.max(0.25, Math.min(2, oldScale + delta));

        pmPanX = mouseX - (mouseX - pmPanX) * (newScale / oldScale);
        pmPanY = mouseY - (mouseY - pmPanY) * (newScale / oldScale);

        pmZoom = newScale * 100;
        schedulePmTransformUpdate();
      }, { passive: false });
      pmViewport.addEventListener('mousedown', function(e) {
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;
        pmDragging = true;
        pmLastX = e.clientX;
        pmLastY = e.clientY;
        pmViewport.classList.add('dragging');
      });
    }
    document.addEventListener('mousemove', function(e) {
      if (!pmDragging) return;
      pmPanX += e.clientX - pmLastX;
      pmPanY += e.clientY - pmLastY;
      pmLastX = e.clientX;
      pmLastY = e.clientY;
      schedulePmTransformUpdate();
    });
    document.addEventListener('mouseup', function() {
      pmDragging = false;
      var vp = document.getElementById('mapping-viewport');
      if (vp) vp.classList.remove('dragging');
    });

    var pmZoomIn = document.getElementById('pm-zoom-in');
    var pmZoomOut = document.getElementById('pm-zoom-out');
    var pmZoomReset = document.getElementById('pm-zoom-reset');
    if (pmZoomIn) pmZoomIn.addEventListener('click', function() {
      var vp = document.getElementById('mapping-viewport');
      if (!vp) { pmZoom = Math.min(200, pmZoom + 25); updatePmTransform(false); return; }
      var rect = vp.getBoundingClientRect();
      var centerX = rect.width / 2;
      var centerY = rect.height / 2;
      var oldScale = pmZoom / 100;
      var newScale = Math.min(2, oldScale + 0.25);
      pmPanX = centerX - (centerX - pmPanX) * (newScale / oldScale);
      pmPanY = centerY - (centerY - pmPanY) * (newScale / oldScale);
      pmZoom = newScale * 100;
      updatePmTransform(false);
    });
    if (pmZoomOut) pmZoomOut.addEventListener('click', function() {
      var vp = document.getElementById('mapping-viewport');
      if (!vp) { pmZoom = Math.max(25, pmZoom - 25); updatePmTransform(false); return; }
      var rect = vp.getBoundingClientRect();
      var centerX = rect.width / 2;
      var centerY = rect.height / 2;
      var oldScale = pmZoom / 100;
      var newScale = Math.max(0.25, oldScale - 0.25);
      pmPanX = centerX - (centerX - pmPanX) * (newScale / oldScale);
      pmPanY = centerY - (centerY - pmPanY) * (newScale / oldScale);
      pmZoom = newScale * 100;
      updatePmTransform(false);
    });
    if (pmZoomReset) pmZoomReset.addEventListener('click', function() { pmZoom = 100; centerPinMapping(); });

    // ===== 主渲染函数 =====
    function renderNetlist(netlist) {
      try {
        // 重置星图状态（切换/刷新网表后避免残留旧器件）
        starInited = false;
        starMainDesig = '';
        starSelectedNet = null;
        starHiddenSet = {};
        starModelCache.key = null;
        starModelCache.data = null;
        var components = netlist.components || netlist;
        var compIds = Object.keys(components);
        var totalPins = 0;
        var netSet = {};
        for (var cid in components) {
          var pim = components[cid].pinInfoMap || {};
          for (var pn in pim) { totalPins++; netSet[pim[pn].net || '(悬空)'] = true; }
        }
        document.getElementById('stat-components').textContent = compIds.length;
        document.getElementById('stat-nets').textContent = Object.keys(netSet).length;
        document.getElementById('stat-pins').textContent = totalPins;

        // 统计：未命名网络、电源网络
        var unnamedNets = {};
        var powerNets = {};
        for (var cid2 in components) {
          var pim2 = components[cid2].pinInfoMap || {};
          for (var pn2 in pim2) {
            var pinData = pim2[pn2];
            var net2 = pinData.net || '';
            if (!net2 || net2 === '(悬空)') { 
              continue;
            }
            if (/^\$1N\d+$/.test(net2) || /^\$\d+/.test(net2)) { unnamedNets[net2] = true; continue; }
            if (isPowerNet(net2)) { powerNets[net2] = true; }
          }
        }
        var unnamedCount = Object.keys(unnamedNets).length;
        var unnamedEl = document.getElementById('stat-unnamed');
        unnamedEl.textContent = unnamedCount;
        unnamedEl.className = 'stat-value' + (unnamedCount > 0 ? ' warn' : '');
        renderFullTable(components);
        renderConnectionTable(components);
        populateFilters(components);

        // Generate pin mapping pairs（使用缓存优化）
        try {
          console.log('[网表] 开始生成连接器对...');
          var startTime = Date.now();
          
          // 使用缓存的graph
          var pmGraph = getCachedGraph(netlist);
          console.log('[网表] 网络图计算完成，耗时:', Date.now() - startTime, 'ms');
          
          // 渐进式生成pairs（添加进度提示）
          var pairsLoader = function() {
            var t0 = Date.now();
            var pairs = extractConnectorPairs(netlist);
            console.log('[网表] 连接器对生成完成，耗时:', Date.now() - t0, 'ms，pairs数:', pairs.length);
            
            populatePairSelector(pairs, pmGraph);
            if (pairs.length > 0) {
              // 第一个连接器对延迟渲染
              setTimeout(function() {
                var svg = renderPinMappingSVG(pairs[0], pmGraph);
                document.getElementById('mapping-canvas').innerHTML = svg;
                applyPinMappingFilter();
                document.getElementById('connector-pair-select').value = '0';
              }, 50);
            } else {
              document.getElementById('mapping-canvas').innerHTML = '<div style="padding:40px;text-align:center;color:#6b7280;">' + t('noPairs') + '</div>';
            }
          };
          
          // 延迟执行避免阻塞UI
          setTimeout(pairsLoader, 50);
        } catch(e) {
          console.error('Pin mapping error:', e);
          document.getElementById('mapping-canvas').innerHTML = '<div style="padding:40px;text-align:center;color:#dc2626;">'+t('pmGenFailed')+' ' + escapeHtml(e.message) + '</div>';
        }

        // 延迟渲染JSON，避免切换卡顿
        setTimeout(function() {
          document.getElementById('json-view').textContent = JSON.stringify(netlist, null, 2);
        }, 50);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
        document.getElementById('stats-bar').style.display = 'flex';
        document.getElementById('btn-bom').style.display = 'inline-flex';
        document.getElementById('export-dropdown').style.display = 'inline-block';
      } catch (e) {
        document.getElementById('loading').innerHTML = '<div style="color:red;padding:20px;">'+t('renderFailed')+' ' + escapeHtml(e.message) + '</div>';
      }
    }

    // ============================================================
    // ===== 器件拓扑图（主从星型布局）模块 =====
    // ============================================================
    // 器件分类 css -> 颜色（与全量网表分类标签视觉一致）
    var STAR_CAT_COLORS = {
      ic:'#E74C3C',           // IC - 红色
      resistor:'#3498DB',     // 电阻 - 蓝色
      capacitor:'#27AE60',    // 电容 - 绿色
      inductor:'#F39C12',     // 电感 - 橙色
      diode:'#8E44AD',        // 二极管 - 紫色
      crystal:'#16A085',      // 晶振 - 青绿色
      connector:'#E67E22',    // 连接器 - 深橙色
      fuse:'#C0392B',         // 保险丝 - 深红色
      led:'#F1C40F',          // LED - 黄色
      transistor:'#9B59B6',   // 三极管 - 深紫色
      switch:'#1ABC9C',       // 开关 - 青色
      relay:'#D35400',        // 继电器 - 赭色
      transformer:'#C0392B',  // 变压器 - 深红色
      optocoupler:'#7F8C8D',  // 光耦 - 青灰色
      battery:'#2ECC71',      // 电池 - 鲜绿色
      antenna:'#E74C3C',      // 天线 - 红色
      speaker:'#34495E',      // 扬声器 - 深蓝灰色
      motor:'#9B59B6',        // 电机 - 深紫色
      display:'#16A085',      // 显示屏 - 青绿色
      sensor:'#F39C12',       // 传感器 - 橙色
      filter:'#8E44AD',       // 滤波器 - 紫色
      protector:'#C0392B',    // 保护器件 - 深红色
      oscillator:'#16A085',   // 振荡器 - 青绿色
      regulator:'#3498DB',    // 稳压器 - 蓝色
      converter:'#E67E22',    // 转换器 - 深橙色
      driver:'#9B59B6',       // 驱动器 - 深紫色
      controller:'#27AE60',  // 控制器 - 绿色
      mcu:'#E74C3C',         // MCU - 红色
      memory:'#3498DB',      // 存储器 - 蓝色
      interface:'#F39C12',   // 接口芯片 - 橙色
      power:'#C0392B',       // 电源芯片 - 深红色
      amplifier:'#8E44AD',   // 放大器 - 紫色
      comparator:'#16A085',  // 比较器 - 青绿色
      timer:'#E67E22',       // 定时器 - 深橙色
      logic:'#27AE60',       // 逻辑芯片 - 绿色
      other:'#95A5A6'        // 其他 - 蓝灰色（温和的灰色）
    };
    // 网络配色调色板（哈希取色，区分不同网络）
    var STAR_NET_PALETTE = ['#409EFF','#67C23A','#E6A23C','#F56C6C','#7C4DFF','#00C1DE','#FF7D00','#13C2C2','#EB2F96','#52C41A'];

    function starNetColor(netName) {
      // 根据网络类型返回特定颜色
      if (isPwrNet(netName)) return '#dc2626';  // 电源用红色
      if (isGndNet(netName)) return '#6b7280';  // 地用灰色
      // 信号线用哈希取色
      var hash = 0;
      for (var i = 0; i < netName.length; i++) hash = netName.charCodeAt(i) + ((hash << 5) - hash);
      return STAR_NET_PALETTE[Math.abs(hash) % STAR_NET_PALETTE.length];
    }
    // 网络归类：power / gnd / signal（用于类型过滤，复用现有判断函数）
    function starNetType(net) {
      if (isGndNet(net)) return 'gnd';
      if (isPwrNet(net)) return 'power';
      return 'signal';
    }

    // ---- 数据适配层：把 components 对象 + pinInfoMap 转成星型模型 ----
    var starModelCache = { key: null, data: null };
    function buildStarModel(netlist) {
      var components = netlist.components || netlist;
      var key = (graphCache.netlistStr) || JSON.stringify(components).slice(0, 120);
      if (starModelCache.key === key && starModelCache.data) return starModelCache.data;

      var comps = [];
      var byDesig = {};
      var netMap = {}; // netName -> [ "U1-3", ... ]
      for (var cid in components) {
        var comp = components[cid];
        var props = comp.props || {};
        var pim = comp.pinInfoMap || {};
        var desig = props.Designator || cid;
        var cat = classify(desig);
        var pinNames = [];
        // 引脚号按数字优先排序
        var pns = Object.keys(pim).sort(function(a, b) {
          var na = parseInt(a, 10), nb = parseInt(b, 10);
          if (!isNaN(na) && !isNaN(nb)) return na - nb;
          return String(a).localeCompare(String(b));
        });
        for (var i = 0; i < pns.length; i++) {
          var pn = pns[i];
          var full = desig + '-' + pn;
          pinNames.push(full);
          var rawNet = pim[pn].net;
          var net = (rawNet && rawNet !== '(悬空)') ? rawNet : '';
          if (!net) continue;
          if (/^\$1N\d+$/.test(net) || /^\$\d+/.test(net)) continue; // 跳过未命名网络
          if (!netMap[net]) netMap[net] = [];
          netMap[net].push(full);
        }
        var c = {
          designator: desig,
          footprint: props.Footprint || '',
          value: props.Value || '',
          desc: desc(comp),
          catCss: cat.css,
          catName: cat.name,
          pins: pinNames,
          deviceName: props.Device_name || '',
          manufacturerPart: props['Manufacturer Part'] || ''
        };
        comps.push(c);
        byDesig[desig] = c;
      }
      var networks = [];
      for (var nm in netMap) {
        if (netMap[nm].length < 2) continue; // 单点网络无连接意义
        networks.push({ name: nm, pins: netMap[nm], type: starNetType(nm) });
      }
      var model = { components: comps, networks: networks, byDesig: byDesig };
      starModelCache.key = key;
      starModelCache.data = model;
      return model;
    }

    // ---- 布局：计算单个器件的引脚坐标 ----
    function initStarPinLayout(comp, isMain) {
      var pinCount = comp.pins.length || 1;
      // 卡片布局参数（扩大1.25倍）
      var pinH = 30;    // 引脚行高 (24 * 1.25 = 30)
      comp.boxW = 156;  // 固定宽度 (125 * 1.25 = 156)

      // 标题栏高度根据是否有制造商料号决定（与连接图一致）
      var hasSpec = comp.value || comp.footprint;
      var hasMfgPart = comp.manufacturerPart;
      var headerH = 45; // 基础高度 (36 * 1.25 = 45)
      if (hasSpec && hasMfgPart) headerH = 60; // 有料号时增加高度 (48 * 1.25 = 60)
      else if (hasSpec) headerH = 52; // 只有值/封装时 (40 * 1.25 ≈ 50, 调整为52)

      comp.boxH = headerH + pinCount * pinH + 12;
      comp.headerH = headerH;
      var halfH = comp.boxH / 2;

      // 标题栏显示内容（与连接图一致）
      var deviceName = comp.deviceName || getPrefixName(comp.designator);
      var valueDisplay = comp.value ? (deviceName + ' ' + comp.value) : deviceName;
      comp.headerDisplay = {
        line1: comp.designator,        // 位号
        line2: valueDisplay,             // 器件名 + 值
        line3: comp.manufacturerPart    // 制造商料号（如果有）
      };

      comp.pinLayout = comp.pins.map(function(name, i) {
        var num = name.split('-').pop();
        // py 相对于卡片中心：从标题栏下方开始，增加间距，减去半高
        var py = headerH + 12 + i * pinH - halfH;
        return isMain
          ? { name: name, num: num, px: comp.boxW / 2, py: py, txtX: comp.boxW / 2 - 10, txtY: py + 5 }
          : { name: name, num: num, px: -comp.boxW / 2, py: py, txtX: -comp.boxW / 2 + 10, txtY: py + 5 };
      });
    }

    // ---- 找出与主器件有网络连接的器件 ----
    function getStarShowComponents(model, mainDesig, hiddenSet) {
      if (!mainDesig) return [];
      var related = {};
      related[mainDesig] = true;
      model.networks.forEach(function(net) {
        if (hiddenSet[net.name.toUpperCase()]) return;
        var touchesMain = net.pins.some(function(p) { return p.split('-')[0] === mainDesig; });
        if (touchesMain) net.pins.forEach(function(p) { related[p.split('-')[0]] = true; });
      });
      return model.components.filter(function(c) { return related[c.designator]; });
    }

    // ---- 布局所有显示器件（主器件居中，从器件右侧堆叠）----
    function layoutStarComponents(model, mainDesig, hiddenSet) {
      var shown = getStarShowComponents(model, mainDesig, hiddenSet);
      var mainComp = model.byDesig[mainDesig];
      if (!mainComp) return { shown: [], main: null };
      var slaves = shown.filter(function(c) { return c.designator !== mainDesig; });

      slaves.forEach(function(c) { initStarPinLayout(c, false); });
      initStarPinLayout(mainComp, true);

      mainComp.x = 400;

      // 按主器件引脚连接顺序排列从器件
      var netToSlaves = {};
      model.networks.forEach(function(net) {
        if (hiddenSet[net.name.toUpperCase()]) return;
        netToSlaves[net.name] = net.pins
          .filter(function(p) { return p.split('-')[0] !== mainDesig; })
          .map(function(p) { return p.split('-')[0]; });
      });
      var arranged = [];
      var arrangedSet = {};
      mainComp.pinLayout.forEach(function(mp) {
        model.networks.forEach(function(net) {
          if (hiddenSet[net.name.toUpperCase()]) return;
          if (net.pins.indexOf(mp.name) >= 0) {
            (netToSlaves[net.name] || []).forEach(function(sn) {
              if (!arrangedSet[sn]) {
                var s = slaves.find(function(c) { return c.designator === sn; });
                if (s) { arranged.push(s); arrangedSet[sn] = true; }
              }
            });
          }
        });
      });
      if (arranged.length === 0) arranged = slaves.slice();

      var slaveGap = 40;
      var totalH = 0;
      arranged.forEach(function(c) { totalH += c.boxH; });
      totalH += (arranged.length - 1) * slaveGap;

      mainComp.y = totalH / 2;
      var currentY = 0;
      arranged.forEach(function(c) {
        c.x = mainComp.x + 1080; // 1200 * 0.9 = 1080，缩短左右卡片间距
        c.y = currentY + c.boxH / 2;
        currentY += c.boxH + slaveGap;
      });
      return { shown: [mainComp].concat(arranged), main: mainComp };
    }

    // ---- 渲染星图 SVG 字符串 ----
    function renderStarSVG(model, mainDesig, selectedNet, hiddenSet) {
      var layout = layoutStarComponents(model, mainDesig, hiddenSet);
      var main = layout.main;
      if (!main) return '<div style="padding:40px;text-align:center;color:#6b7280;">' + t('selectMainDeviceHint') + '</div>';
      var shown = layout.shown;

      var dark = document.documentElement.dataset.theme === 'dark';
      var C = dark ? {
        bg:'#111827', boxStroke:'#1f2937', textPin:'#e5e7eb', pinFill:'#1f2937', pinStroke:'#9ca3af',
        cardBg:'#1f2937', headerFill:'#374151', textPrimary:'#f9fafb', textSecondary:'#e5e7eb', textMuted:'#9ca3af',
        pinText:'#e5e7eb'
      } : {
        bg:'#ffffff', boxStroke:'#ffffff', textPin:'#333333', pinFill:'#ffffff', pinStroke:'#666666',
        cardBg:'#ffffff', headerFill:'#f3f4f6', textPrimary:'#1f2937', textSecondary:'#374151', textMuted:'#6b7280',
        pinText:'#374151'
      };

      // 计算包围盒
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      shown.forEach(function(c) {
        minX = Math.min(minX, c.x - c.boxW / 2);
        maxX = Math.max(maxX, c.x + c.boxW / 2);
        minY = Math.min(minY, c.y - c.boxH / 2);
        maxY = Math.max(maxY, c.y + c.boxH / 2);
      });
      var pad = 120;
      var vbX = minX - pad, vbY = minY - pad;
      var svgW = (maxX - minX) + pad * 2;
      var svgH = (maxY - minY) + pad * 2;

      var parts = ['<svg xmlns="http://www.w3.org/2000/svg" width="' + Math.round(svgW) + '" height="' + Math.round(svgH) + '" viewBox="' + Math.round(vbX) + ' ' + Math.round(vbY) + ' ' + Math.round(svgW) + ' ' + Math.round(svgH) + '" style="font-family:system-ui,sans-serif;background:' + C.bg + ';">'];

      var selUp = selectedNet ? selectedNet.toUpperCase() : null;

      // ---- 连线层：主器件内部同网络多引脚 + 主->从 ----
      model.networks.forEach(function(net) {
        if (hiddenSet[net.name.toUpperCase()]) return;
        // 检查网络类型过滤
        if (!starNetTypeFilter.all && !starNetTypeFilter[net.type]) return;
        var color = starNetColor(net.name);
        var isSel = selUp && net.name.toUpperCase() === selUp;
        var dim = selUp && !isSel;
        var nt = net.type;

        // 主器件内部连线（>=2 个主引脚在同网络）
        var mainPins = net.pins.filter(function(p) { return p.split('-')[0] === main.designator; });
        if (mainPins.length >= 2) {
          var pts = mainPins.map(function(pn) {
            var p = main.pinLayout.find(function(x) { return x.name === pn; });
            return p ? { x: main.x - main.boxW / 2 - 10, y: main.y + p.py } : null;
          }).filter(Boolean);
          pts.sort(function(a, b) { return a.y - b.y; });
          var ext = 20, sw = isSel ? 4 : 2, op = dim ? 0.15 : 0.6;
          for (var i = 1; i < pts.length; i++) {
            var pr = pts[i - 1], cu = pts[i];
            parts.push('<path data-net-type="' + nt + '" d="M ' + pr.x + ' ' + pr.y + ' L ' + (pr.x - ext) + ' ' + pr.y + ' L ' + (cu.x - ext) + ' ' + cu.y + ' L ' + cu.x + ' ' + cu.y + '" stroke="' + color + '" stroke-width="' + sw + '" fill="none" opacity="' + op + '"/>');
          }
        }

        // 主器件 -> 从器件
        var mainPin = net.pins.find(function(p) { return p.split('-')[0] === main.designator; });
        if (!mainPin) return;
        var mp = main.pinLayout.find(function(x) { return x.name === mainPin; });
        if (!mp) return;
        var mx = main.x + mp.px, my = main.y + mp.py;
        var ext2 = isSel ? 50 : 0;

        net.pins.forEach(function(pinStr) {
          var cn = pinStr.split('-')[0];
          if (cn === main.designator) return;
          var slave = model.byDesig[cn];
          if (!slave || !slave.pinLayout) return;
          var sp = slave.pinLayout.find(function(x) { return x.name === pinStr; });
          if (!sp) return;
          var sx = slave.x + sp.px, sy = slave.y + sp.py;

          // 使用简单直线，减少计算
          var lx = (mx + sx) / 2, ly = (my + sy) / 2 - 6;
          var sw = isSel ? 4 : 2;
          var opacity = dim ? 0.15 : 0.8;

          // 单次 push，减少字符串拼接
          parts.push('<g data-net-type="' + nt + '"><path d="M ' + mx + ' ' + my + ' L ' + sx + ' ' + sy + '" stroke="' + color + '" stroke-width="' + sw + '" fill="none" opacity="' + opacity + '"/>');

          // 只在选中或距离较远时显示标签
          if (!selUp || isSel) {
            var dx = sx - mx, dy = sy - my;
            if ((dx * dx + dy * dy > 10000) || isSel) {
              parts.push('<text data-net="' + escapeHtml(net.name) + '" x="' + lx + '" y="' + ly + '" fill="' + color + '" font-size="11" text-anchor="middle" style="pointer-events:none;">' + escapeHtml(net.name) + '</text>');
            }
          }
          parts.push('</g>');
        });
      });

      // ---- 器件层 ----
      shown.forEach(function(comp) {
        var isMainC = comp.designator === main.designator;
        var catColor = STAR_CAT_COLORS[comp.catCss] || STAR_CAT_COLORS.other;
        var headerH = comp.headerH || 45;
        var halfW = comp.boxW / 2;
        var halfH = comp.boxH / 2;
        var topY = -halfH;
        var headerDisplay = comp.headerDisplay || { line1: comp.designator, line2: '', line3: '' };
        parts.push('<g class="star-comp-node" data-des="' + escapeHtml(comp.designator) + '" transform="translate(' + comp.x + ',' + comp.y + ')">');
        // 卡片主体
        parts.push('<rect x="' + (-halfW) + '" y="' + topY + '" width="' + comp.boxW + '" height="' + comp.boxH + '" rx="5" fill="' + C.cardBg + '" stroke="' + catColor + '" stroke-width="2"/>');
        // 标题栏（使用分类色填充）
        parts.push('<rect x="' + (-halfW) + '" y="' + topY + '" width="' + comp.boxW + '" height="' + headerH + '" rx="5" fill="' + catColor + '"/>');
        parts.push('<rect x="' + (-halfW) + '" y="' + (topY + headerH / 2) + '" width="' + comp.boxW + '" height="' + (headerH / 2) + '" fill="' + catColor + '"/>');
        // 第一行：位号（白色文字，加粗）
        parts.push('<text x="0" y="' + (topY + 20) + '" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">' + escapeHtml(headerDisplay.line1) + '</text>');
        // 第二行：器件名 + 值（白色半透明）
        if (headerDisplay.line2) {
          parts.push('<text x="0" y="' + (topY + 35) + '" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">' + escapeHtml(headerDisplay.line2) + '</text>');
        }
        // 第三行：制造商料号（如果有，更小更淡）
        if (headerDisplay.line3) {
          parts.push('<text x="0" y="' + (topY + 48) + '" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">' + escapeHtml(headerDisplay.line3) + '</text>');
        }
        // 引脚列表
        comp.pinLayout.forEach(function(pin) {
          // pin.py 已经是相对于卡片中心的坐标
          // 引脚圆点
          parts.push('<circle class="star-pin" data-pin="' + escapeHtml(pin.name) + '" cx="' + pin.px + '" cy="' + pin.py + '" r="5" fill="' + C.pinFill + '" stroke="' + catColor + '" stroke-width="1.5"/>');
          // 引脚号
          if (isMainC) {
            // 主器件：右侧引脚，引脚号在圆点右侧
            parts.push('<text x="' + (pin.px - 10) + '" y="' + (pin.py + 5) + '" text-anchor="end" font-size="12" font-weight="600" fill="' + C.pinText + '">' + escapeHtml(pin.num) + '</text>');
          } else {
            // 从器件：左侧引脚，引脚号在圆点左侧
            parts.push('<text x="' + (pin.px + 10) + '" y="' + (pin.py + 5) + '" text-anchor="start" font-size="12" font-weight="600" fill="' + C.pinText + '">' + escapeHtml(pin.num) + '</text>');
          }
        });
        // 主器件：左侧镜像引脚
        if (isMainC) {
          comp.pinLayout.forEach(function(pin) {
            parts.push('<circle class="star-pin" data-pin="' + escapeHtml(pin.name) + '" cx="' + (-pin.px) + '" cy="' + pin.py + '" r="5" fill="' + C.pinFill + '" stroke="' + catColor + '" stroke-width="1.5"/>');
            parts.push('<text x="' + (-pin.px + 10) + '" y="' + (pin.py + 5) + '" text-anchor="start" font-size="12" font-weight="600" fill="' + C.pinText + '">' + escapeHtml(pin.num) + '</text>');
          });
        }
        parts.push('</g>');
      });

      parts.push('</svg>');
      return parts.join('');
    }

    // ---- 星图交互状态 ----
    var szZoom = 40, szPanX = 0, szPanY = 0, szDragging = false, szLastX, szLastY, szRafPending = false;
    var starMainDesig = '';
    var starMainY = 0; // 主器件的 y 坐标，用于聚焦对齐
    var starSelectedNet = null;
    var starHiddenSet = {}; // 大写网络名 -> true
    var starNetTypeFilter = { all: true, power: false, gnd: false, signal: false };
    var starInited = false;

    function updateSzTransform(smooth) {
      var canvas = document.getElementById('star-canvas');
      if (canvas) {
        canvas.classList.toggle('smooth-transition', !!smooth);
        canvas.style.transform = 'translate3d(' + szPanX + 'px,' + szPanY + 'px,0) scale(' + (szZoom / 100) + ')';
      }
      var level = document.getElementById('sz-zoom-level');
      if (level) level.textContent = Math.round(szZoom * 2.5) + '%';
    }
    function scheduleSzTransformUpdate() {
      if (szRafPending) return;
      szRafPending = true;
      requestAnimationFrame(function() { szRafPending = false; updateSzTransform(false); });
    }
    function centerStarGraph() {
      var vp = document.getElementById('star-viewport');
      var svg = document.querySelector('#star-canvas svg');
      if (!vp || !svg) { updateSzTransform(); return; }
      var vpW = vp.clientWidth, vpH = vp.clientHeight;
      var svgW = parseFloat(svg.getAttribute('width')) || 0;
      var svgH = parseFloat(svg.getAttribute('height')) || 0;
      if (svgW) {
        szPanX = (vpW - svgW * szZoom / 100) / 2;
        // y 轴对齐到主器件位置，确保主器件在视口中垂直居中
        var svgTop = parseFloat(svg.getAttribute('viewBox').split(' ')[1]) || 0;
        szPanY = vpH / 2 - (starMainY + svgTop) * szZoom / 100;
      }
      updateSzTransform(true);
    }

    function applyStarNetTypeFilter() {

              if (b.dataset.type === 'gnd') b.classList.add('active');

    // ---- 网络列表面板相关 ----
    var starNetworkSearchFilter = '';

    function renderStarNetworkList() {
      if (!netlistData || !starMainDesig) return;
      var model = buildStarModel(netlistData);
      var mainComp = model.byDesig[starMainDesig];
      if (!mainComp) return;

      // 找出与主器件相关的所有网络
      var relatedNets = [];
      model.networks.forEach(function(net) {
        var touchesMain = net.pins.some(function(p) { return p.split('-')[0] === starMainDesig; });
        if (touchesMain) {
          relatedNets.push(net);
        }
      });

      // 应用搜索过滤
      var searchFilter = starNetworkSearchFilter.toUpperCase();
      if (searchFilter) {
        relatedNets = relatedNets.filter(function(net) {
          return net.name.toUpperCase().indexOf(searchFilter) >= 0;
        });
      }

      // 按网络名称排序
      relatedNets.sort(function(a, b) { return a.name.localeCompare(b.name); });

      // 更新统计
      var totalNets = relatedNets.length;
      var filteredCount = Object.keys(starHiddenSet).filter(function(n) {
        return relatedNets.some(function(net) { return net.name.toUpperCase() === n; });
      }).length;

      document.getElementById('star-total-nets').textContent = filteredCount;
      document.getElementById('star-filtered-nets').textContent = totalNets;

      // 渲染列表
      var listEl = document.getElementById('star-network-list');
      var html = '';
      relatedNets.forEach(function(net) {
        var netUp = net.name.toUpperCase();
        var isHidden = !!starHiddenSet[netUp];
        var pinCount = net.pins.length;
        var netType = net.type;
        var typeColor = '';
        if (netType === 'power') typeColor = '#dc2626';
        else if (netType === 'gnd') typeColor = '#6b7280';
        else if (netType === 'signal') typeColor = '#16a34a';

        html += '<div class="star-network-item' + (isHidden ? ' filtered' : '') + '" data-net="' + escapeHtml(net.name) + '">';
        html += '<span class="net-name" style="color:' + typeColor + ';">' + escapeHtml(net.name) + '</span>';
        html += '<span class="net-info">' + pinCount + 'P</span>';
        html += '<span class="filter-icon' + (isHidden ? ' active' : '') + '">' + (isHidden ? '✓' : '×') + '</span>';
        html += '</div>';
      });
      listEl.innerHTML = html;

      // 绑定点击事件
      listEl.querySelectorAll('.star-network-item').forEach(function(item) {
        item.addEventListener('click', function() {
          var netName = item.dataset.net;
          var netUp = netName.toUpperCase();
          if (starHiddenSet[netUp]) {
            delete starHiddenSet[netUp];
          } else {
            starHiddenSet[netUp] = true;
          }
          drawStarGraph(false);
          renderStarNetworkList();
        });
      });
    }

    function bindStarSvgEvents() {
      var canvas = document.getElementById('star-canvas');
      if (!canvas) return;

      canvas.querySelectorAll('.star-comp-node').forEach(function(g) {
        g.addEventListener('click', function(e) {
          if (e.target.classList.contains('star-pin')) return; // 引脚单独处理
          var des = g.dataset.des;
          if (des && des !== starMainDesig) {
            starMainDesig = des;
            starSelectedNet = null;
            var sel = document.getElementById('star-device-select');
            if (sel) sel.value = des;
            // 重置网络类型过滤状态（确保所有类型可见）
            starNetTypeFilter = { all: true, power: false, gnd: false, signal: false };
            // 更新按钮状态
            document.querySelectorAll('.star-ntf-btn').forEach(function(b) {
              if (b.dataset.type === 'all') b.classList.add('active');
              else b.classList.remove('active');
            });
            // 自动过滤与主器件相关的GND网络
            var model = buildStarModel(netlistData);
            autoFilterGndNetworks(model, starMainDesig);
            drawStarGraph(true);
          }
        });
      });

      canvas.querySelectorAll('.star-pin').forEach(function(c) {

          e.stopPropagation();

          var model = buildStarModel(netlistData);
          var net = model.networks.find(function(n) { return n.pins.indexOf(pin) >= 0; });
          if (!net) return;
          starSelectedNet = (starSelectedNet === net.name) ? null : net.name;
          drawStarGraph(false);
        });
      });
      // 点击网络标签 -> 隐藏该网络
      canvas.querySelectorAll('.star-net-label').forEach(function(txt) {
        txt.addEventListener('click', function(e) {
          e.stopPropagation();
          var n = (txt.dataset.net || '').toUpperCase();
          if (n) { starHiddenSet[n] = true; starSelectedNet = null; drawStarGraph(false); }
        });

    // 自动过滤 GND 网络到 starHiddenSet（只过滤与主器件相关的GND网络）
    function autoFilterGndNetworks(model, mainDesig) {
      if (!mainDesig) return;
      // 处理与主器件相关的GND网络
      model.networks.forEach(function(net) {
        if (net.type === 'gnd') {
          var touchesMain = net.pins.some(function(p) { return p.split('-')[0] === mainDesig; });
          var netNameUpper = net.name.toUpperCase();
          if (touchesMain) {
            // 与主器件相关，添加到过滤列表
            starHiddenSet[netNameUpper] = true;
          } else {
            // 与主器件无关，从过滤列表中移除（如果是GND网络）
            if (starHiddenSet[netNameUpper]) {
              delete starHiddenSet[netNameUpper];
            }
          }
        }
      });
    }

    // 缩放/平移（复用 pm 同款 CSS transform 方案，独立状态）
    (function() {
      var vp = document.getElementById('star-viewport');
      var canvas = document.getElementById('star-canvas');
      if (canvas) canvas.addEventListener('transitionend', function() { canvas.classList.remove('smooth-transition'); });
      if (vp) {
        vp.addEventListener('wheel', function(e) {
          e.preventDefault();
          var rect = vp.getBoundingClientRect();
          var mx = e.clientX - rect.left, my = e.clientY - rect.top;
          var oldScale = szZoom / 100;
          var newScale = Math.max(0.25, Math.min(2, oldScale + (e.deltaY > 0 ? -0.05 : 0.05)));
          szPanX = mx - (mx - szPanX) * (newScale / oldScale);
          szPanY = my - (my - szPanY) * (newScale / oldScale);
          szZoom = newScale * 100;
          scheduleSzTransformUpdate();
        }, { passive: false });
        vp.addEventListener('mousedown', function(e) {
          if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;
          if (e.target.classList && (e.target.classList.contains('star-pin') || e.target.classList.contains('star-net-label'))) return;
          szDragging = true; szLastX = e.clientX; szLastY = e.clientY; vp.classList.add('dragging');
        });
      }
      document.addEventListener('mousemove', function(e) {
        if (!szDragging) return;
        szPanX += e.clientX - szLastX; szPanY += e.clientY - szLastY;
        szLastX = e.clientX; szLastY = e.clientY;
        scheduleSzTransformUpdate();
      });
      document.addEventListener('mouseup', function() {
        szDragging = false;
        var v = document.getElementById('star-viewport');
        if (v) v.classList.remove('dragging');
      });
      var zi = document.getElementById('sz-zoom-in'), zo = document.getElementById('sz-zoom-out'), zr = document.getElementById('sz-zoom-reset');
      function zoomAt(dir) {
        var v = document.getElementById('star-viewport');
        if (!v) { szZoom = Math.max(10, Math.min(80, szZoom + dir * 10)); updateSzTransform(true); return; }
        var rect = v.getBoundingClientRect();
        var cx = rect.width / 2, cy = rect.height / 2;
        var oldScale = szZoom / 100;
        var newScale = Math.max(0.10, Math.min(0.80, oldScale + dir * 0.10));
        szPanX = cx - (cx - szPanX) * (newScale / oldScale);
        szPanY = cy - (cy - szPanY) * (newScale / oldScale);
        szZoom = newScale * 100;
        updateSzTransform(true);
      }
      if (zi) zi.addEventListener('click', function() { zoomAt(1); });
      if (zo) zo.addEventListener('click', function() { zoomAt(-1); });
      if (zr) zr.addEventListener('click', function() { szZoom = 40; centerStarGraph(); });
    })();

      for (var k in bomMap) {
        var b = bomMap[k];
        lines.push('"'+b.desigs.join('; ')+'","'+b.name+'","'+b.value+'","'+b.fp+'","'+b.mfr+'","'+b.mpn+'","'+b.spn+'",'+b.count);
      }
      var blob = new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
      eda.sys_FileSystem.saveFile(blob, 'BOM_'+new Date().toISOString().slice(0,10)+'.csv');
      eda.sys_Message.showToastMessage(t('toastBomCsv'));
    });

    // 面板专属导出按钮
    document.querySelectorAll('.panel-export-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var action = this.dataset.action;
        if (action === 'export-full-csv') {
          if (!netlistData) return;
          var comps = netlistData.components || netlistData;
          var lines = ['Designator,Pin,PinName,Net,Category,Description'];
          for (var cid in comps) {
            var c = comps[cid], p = c.props || {};
            var pim = c.pinInfoMap || {};
            var d = p.Designator || cid;
            var cat = classify(d).name;
            var dsc = desc(c);
            for (var pn in pim) lines.push(d+','+pn+','+(pim[pn].pinName||'')+','+(pim[pn].net||'')+','+cat+','+dsc);
          }
          var blob = new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
          eda.sys_FileSystem.saveFile(blob, 'full_netlist.csv');
          eda.sys_Message.showToastMessage(t('toastFullCsv'));
        } else if (action === 'export-conn-csv') {
          if (!netlistData) return;
          var comps = netlistData.components || netlistData;
          var lines = ['Group,SourceDevice,SourcePin,SourcePort,Net,TargetDevice,TargetPin,TargetPort,Note'];
          var netToPins = {};
          for (var cid in comps) {
            var c = comps[cid], p = c.props || {};
            var pim = c.pinInfoMap || {};
            var desig = p.Designator || cid;
            for (var pn in pim) {
              var net = pim[pn].net || '(悬空)';
              if (net === '(悬空)') continue;
              if (!netToPins[net]) netToPins[net] = [];
              netToPins[net].push({desig:desig, pn:pn, pinName:pim[pn].pinName||''});
            }
          }
          for (var net in netToPins) {
            var pins = netToPins[net];
            if (pins.length === 2) lines.push(getGroup(net)[0]+','+pins[0].desig+','+pins[0].pn+','+pins[0].pinName+','+net+','+pins[1].desig+','+pins[1].pn+','+pins[1].pinName+',');
            else lines.push(getGroup(net)[0]+','+pins.map(function(p){return p.desig+':'+p.pn;}).join(';')+','+net+',,'+pins.length+' pins');
          }
          var blob = new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
          eda.sys_FileSystem.saveFile(blob, 'connection_netlist.csv');
          eda.sys_Message.showToastMessage(t('toastConnCsv'));
        } else if (action === 'export-svg') {
          var svgEl = document.querySelector('#mapping-canvas svg');
          if (!svgEl) { eda.sys_Message.showToastMessage(t('toastNoSvg')); return; }
          var svgStr = new XMLSerializer().serializeToString(svgEl);
          var blob = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
          eda.sys_FileSystem.saveFile(blob, 'pin_mapping.svg');
          eda.sys_Message.showToastMessage(t('toastSvg'));
        } else if (action === 'export-star-svg') {
          var starSvgEl = document.querySelector('#star-canvas svg');
          if (!starSvgEl) { eda.sys_Message.showToastMessage(t('toastNoStarSvg')); return; }
          var starSvgStr = new XMLSerializer().serializeToString(starSvgEl);
          var starBlob = new Blob([starSvgStr], {type:'image/svg+xml;charset=utf-8'});
          eda.sys_FileSystem.saveFile(starBlob, 'star_graph_' + (starMainDesig || 'netlist') + '.svg');
          eda.sys_Message.showToastMessage(t('toastStarSvg'));
        } else if (action === 'export-json') {
          if (!netlistStr2) return;
          var blob = new Blob([netlistStr2],{type:'application/json;charset=utf-8'});
          eda.sys_FileSystem.saveFile(blob, 'netlist.json');
          eda.sys_Message.showToastMessage(t('toastJson'));
        }
      });
    });

    // ===== 直接调用 API 获取网表数据 =====
    async function fetchNetlist() {
      try {
        var netlistFile = await eda.sch_ManufactureData.getNetlistFile();
        if (!netlistFile) {
          document.getElementById('loading').innerHTML = '<div style="color:#dc2626;padding:20px;">无法获取网表，请确保已打开原理图</div>';
          return;
        }
        var netlistStr = await netlistFile.text();
        var netlist = JSON.parse(netlistStr);
        
        // 保存到全局变量，供导出功能使用
        netlistData = netlist;
        netlistStr2 = netlistStr;
        
        // 渲染
        renderNetlist(netlist);
      } catch(e) {
        document.getElementById('loading').innerHTML = '<div style="color:#dc2626;padding:20px;">获取网表失败: ' + (e.message || e) + '</div>';
      }
    }
    
    // 全局变量用于导出
    var netlistData = null;
    var netlistStr2 = '';

    // 页面加载时直接获取网表（内部会请求 noConnected 数据）
    fetchNetlist();
    
    // 初始化 i18n
    applyI18n();

    // 刷新按钮 - 重新获取网表
    document.getElementById('btn-refresh').addEventListener('click', function() {
      document.getElementById('loading').style.display = '';
      document.getElementById('main-content').style.display = 'none';
      fetchNetlist().then(function() {
        // 延迟让 EDA UI 恢复状态
        setTimeout(function() {
          window.dispatchEvent(new Event('resize'));
        }, 500);
      });
    });
  </script>
</body>
</html>
