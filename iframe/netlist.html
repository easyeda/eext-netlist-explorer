<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netlist Generator</title>
  <style>
    :root {
      --bg: #f9fafb; --bg-white: #ffffff; --border: #e5e7eb;
      --text-primary: #1f2937; --text-secondary: #374151; --text-muted: #6b7280; --text-faint: #9ca3af;
      --hover-bg: #f3f4f6; --active-bg: #eff6ff; --active-border: #bfdbfe; --active-color: #2563eb;
      --table-header-bg: #f9fafb; --row-hover: #f9fafb;
      --json-bg: #1f2937; --json-text: #e5e7eb;
      --panel-header-bg: #f9fafb;
    }
    [data-theme="dark"] {
      --bg: #111827; --bg-white: #1f2937; --border: #374151;
      --text-primary: #f9fafb; --text-secondary: #e5e7eb; --text-muted: #9ca3af; --text-faint: #6b7280;
      --hover-bg: #374151; --active-bg: #1e3a5f; --active-border: #1d4ed8; --active-color: #60a5fa;
      --table-header-bg: #111827; --row-hover: #1f2937;
      --json-bg: #111827; --json-text: #d1d5db;
      --panel-header-bg: #1f2937;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; }
    #app { display: flex; flex-direction: column; width: 100%; height: 100%; }
    .header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; background: var(--bg-white); border-bottom: 1px solid var(--border); z-index: 10; }
    .header-title { font-size: 15px; font-weight: 600; color: var(--text-primary); padding-bottom: 2px; border-bottom: 2px solid #2563eb; }
    .header-actions { display: flex; align-items: center; gap: 8px; position: relative; }
    .btn { padding: 6px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .btn-primary { background: linear-gradient(135deg, #4A90E2 0%, #2563EB 100%); color: #fff; }
    .btn-primary:hover { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); }
    .btn-secondary { background: var(--hover-bg); color: var(--text-secondary); }
    .btn-secondary:hover { background: var(--border); }
    .icon-btn { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-white); color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; transition: background 0.15s, color 0.15s; }
    .icon-btn:hover { background: var(--hover-bg); color: var(--text-primary); }
    .icon-btn svg { width: 16px; height: 16px; }
    .export-dropdown { position: relative; }
    .export-btn-main { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; background: linear-gradient(135deg, #4A90E2 0%, #2563EB 100%); color: #fff; }
    .export-btn-main:hover { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); }
    .export-btn-main svg { width: 16px; height: 16px; flex-shrink: 0; }
    .export-menu { display: none; position: absolute; top: 100%; right: 0; margin-top: 8px; background: var(--bg-white); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 180px; z-index: 100; overflow: hidden; }
    .export-menu.show { display: block; }
    .export-menu-item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: background 0.1s; border: none; background: none; width: 100%; text-align: left; white-space: nowrap; }
    .export-menu-item:hover { background: var(--hover-bg); }
    .export-menu-item svg { width: 16px; height: 16px; color: var(--text-muted); }

    /* 顶部统计栏 */
    .stats-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: flex-start; gap: 24px; padding: 6px 20px; background: var(--bg-white); border-bottom: 1px solid var(--border); }
    .stat-item { display: flex; flex-direction: row; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0; }
    .stat-icon { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
    .stat-text { display: flex; flex-direction: row; gap: 4px; align-items: baseline; white-space: nowrap; }
    .stat-value { font-size: 14px; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
    .stat-value.warn { color: #f97316; }
    .stat-label { font-size: 11px; color: var(--text-faint); font-weight: 400; white-space: nowrap; }

    /* 主内容区 */
    .main-layout { flex: 1; display: flex; overflow: hidden; }

    /* 左侧边栏 */
    .sidebar { flex-shrink: 0; width: 200px; background: var(--bg-white); border-right: 1px solid var(--border); padding: 12px; display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-nav { flex: 1; overflow-y: auto; }
    .sidebar-footer { border-top: 1px solid var(--border); padding: 10px 4px 4px; margin-top: 8px; }
    .sidebar-footer-name { font-size: 12px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.02em; }
    .sidebar-footer-version { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-muted); transition: all 0.15s; margin-bottom: 6px; border: 1px solid transparent; white-space: nowrap; }
    .sidebar-item:hover { background: var(--hover-bg); color: var(--text-secondary); border-color: var(--border); }
    .sidebar-item.active { background: var(--active-bg); color: var(--active-color); border-color: var(--active-border); box-shadow: 0 1px 3px rgba(37,99,235,0.1); }
    .sidebar-item svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* 右侧内容区 */
    .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; background: var(--bg-white); }
    .content-panel { display: none; flex-direction: column; flex: 1; min-height: 0; position: relative; overflow: hidden; width: 100%; height: 100%; }
    .content-panel.active { display: flex; }
    #panel-full-table, #panel-connection-table { overflow-y: auto; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--panel-header-bg); border-bottom: 1px solid var(--border); border-radius: 6px 6px 0 0; flex-shrink: 0; }
    .panel-header-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0; }
    .panel-header-title svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
    .panel-header-right { display: flex; align-items: center; gap: 6px; }
    .panel-export-btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-white); font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: background 0.15s; white-space: nowrap; flex-shrink: 0; }
    .panel-export-btn:hover { background: var(--hover-bg); }
    .panel-export-btn svg { width: 14px; height: 14px; }
    .filter-bar { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .filter-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--bg-white); color: var(--text-secondary); cursor: pointer; max-width: 140px; }
    .filter-select:hover { border-color: var(--text-faint); }
    .pin-mapping-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--bg-white); color: var(--text-secondary); cursor: pointer; }
    .pin-mapping-select:hover { border-color: var(--text-faint); }
    .pin-mapping-select:disabled { opacity: 0.5; cursor: not-allowed; }
    .net-type-filter { display: flex; align-items: center; gap: 4px; }
    .ntf-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--bg-white); color: var(--text-secondary); cursor: pointer; transition: background 0.15s, color 0.15s; white-space: nowrap; flex-shrink: 0; }
    .ntf-btn:hover { background: var(--hover-bg); }
    .ntf-btn.active { background: #1f2937; color: #fff; border-color: #1f2937; }
    .ntf-btn[data-type="power"].active { background: #dc2626; border-color: #dc2626; color: #fff; }
    .ntf-btn[data-type="gnd"].active   { background: #6b7280; border-color: #6b7280; color: #fff; }
    .ntf-btn[data-type="signal"].active { background: #16a34a; border-color: #16a34a; color: #fff; }
    .btn-plain { background: transparent; border: none; outline: none; box-shadow: none; padding: 4px 8px; font-size: 12px; color: var(--text-muted); cursor: pointer; white-space: nowrap; flex-shrink: 0; }

    /* 表格容器占满高度 */
    .table-container { width: 100%; }
    .table-container table { width: 100%; border-collapse: collapse; }

    /* JSON 和映射图占满区域 */
    .mapping-viewport { flex: 1; min-height: 0; }

    /* 表格样式 */
    .netlist-table { width: 100%; border-collapse: collapse; }
    .netlist-table th { background: var(--table-header-bg); padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border); position: sticky; top: 0; white-space: nowrap; }
    .netlist-table td { padding: 8px 12px; border-bottom: 1px solid var(--hover-bg); font-size: 12px; white-space: nowrap; }
    .netlist-table tr:hover { background: var(--row-hover); }
    .net-name { color: #059669; font-weight: 600; white-space: nowrap; }
    .pin-num { color: #2563eb; white-space: nowrap; }
    .category-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: #f3f4f6; color: #374151; white-space: nowrap; }
    .category-tag.ic { background: #dbeafe; color: #1e40af; }
    .category-tag.resistor { background: #fef3c7; color: #92400e; }
    .category-tag.capacitor { background: #d1fae5; color: #065f46; }
    .category-tag.inductor { background: #fce7f3; color: #9d174d; }
    .category-tag.diode { background: #fee2e2; color: #991b1b; }
    .category-tag.connector { background: #e0e7ff; color: #3730a3; }
    .category-tag.crystal { background: #f3e8ff; color: #6b21a8; }
    .category-tag.other { background: #f3f4f6; color: #6b7280; }
    .group-header { background: var(--table-header-bg); font-weight: 700; color: var(--text-primary); }
    .group-header td { padding: 10px 12px; border-bottom: 2px solid var(--border); font-size: 13px; white-space: nowrap; }
    .interface-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; white-space: nowrap; }
    .interface-tag.uplink { background: #dbeafe; color: #1e40af; }
    .interface-tag.power { background: #fee2e2; color: #991b1b; }
    .interface-tag.clock { background: #d1fae5; color: #065f46; }
    .interface-tag.other { background: #f3f4f6; color: #6b7280; }

    /* JSON 视图 */
    .json-view { width: 100%; flex: 1; background: var(--json-bg); color: var(--json-text); padding: 16px; border-radius: 8px; font-family: monospace; font-size: 12px; line-height: 1.6; overflow: auto; white-space: pre; min-height: 0; box-sizing: border-box; }

    /* 缩放控件 */
    .zoom-controls { position: absolute; top: 0; right: 0; z-index: 10; display: flex; align-items: center; gap: 4px; background: var(--bg-white); padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .zoom-btn { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-white); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-secondary); }
    .zoom-btn:hover { background: var(--hover-bg); }
    .zoom-level { font-size: 12px; color: var(--text-muted); min-width: 40px; text-align: center; }
    .schematic-viewport { position: relative; width: 100%; height: 100%; min-height: 500px; overflow: hidden; cursor: grab; background: var(--bg-white); }
    .schematic-viewport.dragging { cursor: grabbing; }
    .schematic-canvas { position: absolute; transform-origin: 0 0; }

    /* 引脚映射 */
    .mapping-viewport { position: relative; width: 100%; height: 100%; overflow: hidden; cursor: grab; background: var(--bg-white); }
    .mapping-viewport.dragging { cursor: grabbing; }
    .mapping-canvas { position: absolute; transform-origin: 0 0; will-change: transform; }
    .mapping-canvas.smooth-transition { transition: transform 0.15s ease-out; }
    /* 器件星图面板：过滤按钮（独立类，避免与连接器映射的 .ntf-btn 处理器冲突） */
    .star-ntf-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--bg-white); color: var(--text-secondary); cursor: pointer; transition: background 0.15s, color 0.15s; white-space: nowrap; flex-shrink: 0; }
    .star-ntf-btn:hover { background: var(--hover-bg); }
    .star-ntf-btn.active { background: #1f2937; color: #fff; border-color: #1f2937; }
    .star-ntf-btn[data-type="power"].active { background: #dc2626; border-color: #dc2626; color: #fff; }
    .star-ntf-btn[data-type="gnd"].active   { background: #6b7280; border-color: #6b7280; color: #fff; }
    .star-ntf-btn[data-type="signal"].active { background: #16a34a; border-color: #16a34a; color: #fff; }
    /* 网络列表切换按钮 - 与过滤按钮样式统一 */
    .toggle-btn-with-icon {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      background: var(--bg-white);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-btn-with-icon .icon-char {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .toggle-btn-with-icon:hover {
      background: var(--hover-bg);
    }
    .toggle-btn-with-icon:hover .icon-char {
      color: var(--text-primary);
    }
    #star-canvas svg .star-comp-node { cursor: pointer; }
    #star-canvas svg .star-pin { cursor: pointer; }
    #star-canvas svg .star-net-label { pointer-events: none; }
    .mapping-controls { position: absolute; top: 0; right: 0; z-index: 10; display: flex; align-items: center; gap: 6px; background: var(--bg-white); padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .mapping-controls select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--bg-white); color: var(--text-secondary); cursor: pointer; max-width: 150px; }
    .mapping-controls select:hover { border-color: var(--text-faint); }

    /* 星图网络列表侧边栏 */
    .star-network-sidebar { width: 200px; background: var(--bg-white); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
    .star-network-search { padding: 8px; border-bottom: 1px solid var(--border); }
    .star-network-search input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--bg); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .star-network-search input:focus { border-color: #2563eb; }
    .star-network-list { flex: 1; overflow-y: auto; padding: 4px; }
    .star-network-item { display: grid; grid-template-columns: 1fr auto 20px; align-items: center; gap: 6px; padding: 6px 8px; margin-bottom: 2px; border-radius: 6px; cursor: pointer; transition: background 0.15s; font-size: 12px; min-height: 28px; }
    .star-network-item:hover { background: var(--hover-bg); }
    .star-network-item.filtered { opacity: 0.5; text-decoration: line-through; }
    .star-network-item .net-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 16px; }
    .star-network-item .net-info { font-size: 11px; color: var(--text-muted); line-height: 16px; }
    .star-network-item .filter-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 4px; background: var(--hover-bg); color: var(--text-muted); font-size: 12px; font-weight: normal; }
    .star-network-item .filter-icon.active { background: #e6a23c; color: #fff; }
    .star-network-header { display: grid; grid-template-columns: 1fr auto 32px; align-items: center; gap: 8px; padding: 8px; border-bottom: 1px solid var(--border); background: var(--table-header-bg); font-size: 11px; font-weight: 600; color: var(--text-muted); min-height: 32px; }
    .star-network-header span[data-i18n="networkList"] { line-height: 16px; }
    .star-network-count { display: flex; align-items: center; gap: 4px; line-height: 16px; }
    .star-network-count .num { font-weight: 700; color: var(--text-primary); }
    #star-close-sidebar { display: flex; align-items: center; justify-content: center; width: 32px; height: 24px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); border-radius: 4px; padding: 0; margin: 0; line-height: 1; }
    #star-close-sidebar:hover { background: var(--hover-bg); color: var(--text-primary); }

    /* 加载状态 */
    .loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 15px; }

    /* BOM 弹窗 */
    .bom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .bom-modal.visible { display: flex; }
    .bom-content { background: var(--bg-white); border-radius: 12px; width: 90%; max-width: 800px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .bom-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .bom-header h3 { font-size: 16px; font-weight: 600; }
    .bom-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 4px 8px; border-radius: 6px; }
    .bom-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .bom-table { width: 100%; border-collapse: collapse; }
    .bom-table th { background: var(--table-header-bg); padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border); position: sticky; top: 0; white-space: nowrap; }
    .bom-table td { padding: 8px 12px; border-bottom: 1px solid var(--hover-bg); font-size: 12px; white-space: nowrap; }
    .bom-actions { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <span class="header-title" data-i18n="title">网表生成器</span>
      <div class="header-actions">
        <button id="btn-refresh" class="icon-btn" title="Refresh Netlist" style="width:auto;padding:0 10px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button id="btn-theme" class="icon-btn" title="Toggle Theme">
          <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <!-- Language auto-switches via platform eda.sys_I18n API -->
        <button id="btn-bom" class="btn btn-secondary" style="display:none;">Extract BOM</button>
        <div class="export-dropdown" id="export-dropdown" style="display:none;">
          <button id="btn-export" class="export-btn-main">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span data-i18n="btnExport">导出</span>
          </button>
          <div class="export-menu" id="export-menu">
            <button class="export-menu-item" data-action="export-full-csv">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
              <span data-i18n="exportFullCsv">引脚网络表 CSV</span>

    var netlistData = null;

    // 数据层行数组（用于数据层过滤）

    // 连接关系表分组键

    // 双向筛选映射数据
    var componentNetsMap = {};
    var netComponentsMap = {};

    // 强制刷新检测：如果页面是从缓存加载的，则强制刷新获取最新数据
    (function() {
      var navType = window.performance && window.performance.navigation ? window.performance.navigation.type : 0;
      if (navType === 1) { // TYPE_RELOAD 表示从缓存加载
        console.log('[网表] 页面从缓存加载，强制刷新...');

      // 检查是否有之前的时间戳

    function escapeHtml(t) { if (t == null) return ''; return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // 网络名称友好化处理
    function friendlyNetName(net) {
      if (!net || net === '(悬空)') return t('netFloating');
      return net;
    }

    function classify(d) {
      var p = d.replace(/\d+$/, '').toUpperCase();
      var r = {U:['catIc','ic'],R:['catR','resistor'],C:['catC','capacitor'],L:['catL','inductor'],D:['catD','diode'],Q:['catQ','ic'],Y:['catY','crystal'],X:['catConn','connector'],J:['catConn','connector'],CN:['catConn','connector'],P:['catConn','connector'],USB:['catConn','connector'],F:['catF','other'],FB:['catFb','other'],TP:['catTp','other']};
      var c = r[p]; return c ? {name:t(c[0]),css:c[1]} : {name:t('catOther'),css:'other'};
    }

    function desc(comp) { var p = comp.props || {}; return p.Description || p.Device_name || p.Value || ''; }

    function isPublic(n) { 
      if (!n || n === '(悬空)') return false; 
      // 使用统一的电源/地判断函数
      return isPwrNet(n) || isGndNet(n); 
    }

    function getGroup(n) { var u = (n||'').toUpperCase(); if (['USB','ETH','HDMI'].some(function(k){return u.indexOf(k)>=0;})) return [t('grpUplink'),'uplink']; if (isPwrNet(n) || isGndNet(n)) return [t('grpPower'),'power']; if (['CLK','OSC','RESET'].some(function(k){return u.indexOf(k)>=0;})) return [t('grpClock'),'clock']; return [t('grpOther'),'other']; }

    function renderFullTable(components) {
      fullTableRows = [];
      for (var cid in components) {
        var comp = components[cid];
        var props = comp.props || {};
        var pim = comp.pinInfoMap || {};
        var desig = props.Designator || cid;
        var cat = classify(desig);
        var d = desc(comp);
        for (var pn in pim) {
          fullTableRows.push({
            desig: desig,
            pn: pn,
            pinName: pim[pn].pinName || pim[pn].name || '',
            net: pim[pn].net || '(悬空)',
            catCss: cat.css,
            catName: cat.name,
            desc: d
          });
        }
      }
      renderGen++;
      renderFullTableChunked(fullTableRows, renderGen);
    }

    function buildFullRowHtml(row) {
      return '<tr><td>' + escapeHtml(row.desig) + '</td><td>' + escapeHtml(row.pn) +
        '</td><td>' + escapeHtml(row.pinName) + '</td><td><span class="net-name">' +
        escapeHtml(friendlyNetName(row.net)) + '</span></td><td><span class="category-tag ' +
        row.catCss + '">' + escapeHtml(row.catName) + '</span></td><td>' +
        escapeHtml(row.desc) + '</td></tr>';
    }

    function renderFullTableChunked(rows, gen) {
      var CHUNK = 500;
      var tbody = document.getElementById('tbody-full-table');
      tbody.innerHTML = rows.slice(0, CHUNK).map(buildFullRowHtml).join('');
      var offset = CHUNK;
      function renderNext() {
        if (renderGen !== gen) return;
        if (offset >= rows.length) return;
        tbody.insertAdjacentHTML('beforeend', rows.slice(offset, offset + CHUNK).map(buildFullRowHtml).join(''));
        offset += CHUNK;
        setTimeout(renderNext, 0);
      }
      if (rows.length > CHUNK) setTimeout(renderNext, 0);
    }

    function renderConnectionTable(components) {
      var netToPins = {};
      for (var cid in components) {
        var comp = components[cid];
        var props = comp.props || {};
        var pim = comp.pinInfoMap || {};
        var desig = props.Designator || cid;
        for (var pn in pim) {
          var net = pim[pn].net || '(悬空)';
          var pinName = pim[pn].pinName || pim[pn].name || '';
          if (net === '(悬空)') continue;
          if (/^\$1N\d+$/.test(net) || /^\$\d+/.test(net)) continue;
          if (!netToPins[net]) netToPins[net] = [];
          netToPins[net].push({desig:desig, pn:pn, pinName:pinName});
        }
      }

      var groups = {};
      GROUP_ORDER.forEach(function(k) { groups[k] = []; });
      for (var net in netToPins) {
        var pins = netToPins[net];
        var g = getGroup(net);
        var gKey = g[1];
        if (!groups[gKey]) groups['other'].push({net:net, pins:pins, css:g[1]});
        else groups[gKey].push({net:net, pins:pins, css:g[1]});
      }

      connTableRows = [];
      for (var group in groups) {
        if (groups[group].length === 0) continue;
        connTableRows.push({isHeader:true, group:group, count:groups[group].length});
        for (var gi = 0; gi < groups[group].length; gi++) {
          var item = groups[group][gi];
          var net = item.net, pins = item.pins, css = item.css;
          if (isPublic(net)) {
            for (var pi = 0; pi < pins.length; pi++) {
              connTableRows.push({isHeader:false, group:group, groupCss:css, srcDesig:net, srcPn:'', srcPinName:'', net:net, dstDesig:pins[pi].desig, dstPn:pins[pi].pn, dstPinName:pins[pi].pinName, note:''});
            }
          } else if (pins.length === 2) {
            connTableRows.push({isHeader:false, group:group, groupCss:css, srcDesig:pins[0].desig, srcPn:pins[0].pn, srcPinName:pins[0].pinName, net:net, dstDesig:pins[1].desig, dstPn:pins[1].pn, dstPinName:pins[1].pinName, note:''});
          } else {
            for (var pi = 0; pi < pins.length; pi++) {
              connTableRows.push({isHeader:false, group:group, groupCss:css, srcDesig:pins[pi].desig, srcPn:pins[pi].pn, srcPinName:pins[pi].pinName, net:net, dstDesig:'-', dstPn:'-', dstPinName:'-', note:t('endpoints').replace('{0}', pins.length)});
            }
          }
        }
      }
      renderConnTableFiltered('', '');
    }

    function buildConnRowHtml(row) {
      if (row.isHeader) {
        var groupName = GROUP_KEYS[row.group] ? t(GROUP_KEYS[row.group]) : row.group;
        return '<tr class="group-header"><td colspan="9">' + escapeHtml(groupName) + ' ' + t('networks').replace('{0}', row.count) + '</td></tr>';
      }
      var groupName = GROUP_KEYS[row.group] ? t(GROUP_KEYS[row.group]) : row.group;
      return '<tr><td><span class="interface-tag ' + row.groupCss + '">' + escapeHtml(groupName) +
        '</span></td><td>' + escapeHtml(row.srcDesig) + '</td><td>' + escapeHtml(row.srcPn) +
        '</td><td>' + escapeHtml(row.srcPinName) + '</td><td><span class="net-name">' +
        escapeHtml(row.net) + '</span></td><td>' + escapeHtml(row.dstDesig) +
        '</td><td>' + escapeHtml(row.dstPn) + '</td><td>' + escapeHtml(row.dstPinName) +
        '</td><td>' + escapeHtml(row.note) + '</td></tr>';
    }

    function renderConnTableFiltered(desig, net) {
      var rows = connTableRows;
      if (desig || net) {
        rows = connTableRows.filter(function(r) {
          if (r.isHeader) return true;
          var matchDesig = !desig || r.srcDesig === desig || r.dstDesig === desig;
          var matchNet = !net || r.net === net;
          return matchDesig && matchNet;
        });
      }
      document.getElementById('tbody-connection-table').innerHTML = rows.map(buildConnRowHtml).join('');
    }

    // ===== 筛选功能 =====

    function populateFilters(components) {
      var desigs = [];
      var nets = {};
      componentNetsMap = {};
      netComponentsMap = {};
      for (var cid in components) {
        var comp = components[cid];
        var desig = (comp.props || {}).Designator || cid;
        desigs.push(desig);
        componentNetsMap[desig] = [];
        var pim = comp.pinInfoMap || {};
        for (var pn in pim) {
          var net = pim[pn].net || '';
          if (net && net !== '(悬空)' && !/^\$/.test(net)) {
            nets[net] = true;
            if (componentNetsMap[desig].indexOf(net) === -1) {
              componentNetsMap[desig].push(net);
            }
            if (!netComponentsMap[net]) netComponentsMap[net] = [];
            if (netComponentsMap[net].indexOf(desig) === -1) {
              netComponentsMap[net].push(desig);
            }
          }
        }
      }
      desigs.sort();
      var netList = Object.keys(nets).sort();

      function fillSelect(id, items) {
        var sel = document.getElementById(id);
        if (!sel) return;
        var first = sel.options[0] ? sel.options[0].text : '';
        sel.innerHTML = '<option value="">' + escapeHtml(first) + '</option>' +
          items.map(function(v) { return '<option value="' + escapeHtml(v) + '">' + escapeHtml(v) + '</option>'; }).join('');
      }
      fillSelect('filter-full-desig', desigs);
      fillSelect('filter-full-net', netList);
      fillSelect('filter-conn-desig', desigs);
      fillSelect('filter-conn-net', netList);
    }

    function updateNetsForSelectedComponent(selectId, netSelectId) {
      var desigSelect = document.getElementById(selectId);
      var netSelect = document.getElementById(netSelectId);
      if (!desigSelect || !netSelect) return;
      var selectedDesig = desigSelect.value;
      var currentNetValue = netSelect.value;
      while (netSelect.options.length > 1) netSelect.remove(1);
      if (selectedDesig && componentNetsMap[selectedDesig]) {
        var nets = componentNetsMap[selectedDesig].sort();
        nets.forEach(function(net) {
          var o = document.createElement('option');
          o.value = net; o.textContent = net;
          netSelect.appendChild(o);
        });
      }
      if (currentNetValue && [...netSelect.options].some(function(o) { return o.value === currentNetValue; })) {
        netSelect.value = currentNetValue;
      }
    }

    function updateComponentsForSelectedNet(selectId, desigSelectId) {
      var netSelect = document.getElementById(selectId);
      var desigSelect = document.getElementById(desigSelectId);
      if (!desigSelect || !netSelect) return;
      var selectedNet = netSelect.value;
      var currentDesigValue = desigSelect.value;
      while (desigSelect.options.length > 1) desigSelect.remove(1);
      if (selectedNet && netComponentsMap[selectedNet]) {
        var desigs = netComponentsMap[selectedNet].sort();
        desigs.forEach(function(desig) {
          var o = document.createElement('option');
          o.value = desig; o.textContent = desig;
          desigSelect.appendChild(o);
        });
      }
      if (currentDesigValue && [...desigSelect.options].some(function(o) { return o.value === currentDesigValue; })) {
        desigSelect.value = currentDesigValue;
      }
    }

    function clearFilters(panel) {
      if (panel === 'full') {
        document.getElementById('filter-full-desig').value = '';
        document.getElementById('filter-full-net').value = '';
        applyFullFilter();
        populateFilters(netlistData.components);
      } else if (panel === 'conn') {
        document.getElementById('filter-conn-desig').value = '';
        document.getElementById('filter-conn-net').value = '';
        applyConnFilter();
        populateFilters(netlistData.components);
      }
    }

    function applyFullFilter() {
      var desig = document.getElementById('filter-full-desig').value;
      var net = document.getElementById('filter-full-net').value;
      var rows = fullTableRows;
      if (desig || net) {
        rows = fullTableRows.filter(function(r) {
          var matchDesig = !desig || r.desig === desig;
          var matchNet = !net || friendlyNetName(r.net) === net;
          return matchDesig && matchNet;
        });
      }
      renderGen++;
      renderFullTableChunked(rows, renderGen);
    }

    function applyConnFilter() {
      var desig = document.getElementById('filter-conn-desig').value;
      var net = document.getElementById('filter-conn-net').value;
      renderConnTableFiltered(desig, net);
    }

    document.getElementById('filter-full-desig').addEventListener('change', function() {
      applyFullFilter();
      updateNetsForSelectedComponent('filter-full-desig', 'filter-full-net');
    });
    document.getElementById('filter-full-net').addEventListener('change', function() {
      applyFullFilter();
      updateComponentsForSelectedNet('filter-full-net', 'filter-full-desig');
    });
    document.getElementById('filter-conn-desig').addEventListener('change', function() {
      applyConnFilter();
      updateNetsForSelectedComponent('filter-conn-desig', 'filter-conn-net');
    });
    document.getElementById('filter-conn-net').addEventListener('change', function() {

    document.getElementById('btn-clear-full-filter').addEventListener('click', function() {
      clearFilters('full');

    document.getElementById('btn-clear-conn-filter').addEventListener('click', function() {
      clearFilters('conn');
    });

    // ===== 引脚映射 (Pin Mapping) =====
    
    // 信号名提取
    function inferSignalName(netName) {
      if (!netName || typeof netName !== 'string' || netName === '(悬空)') return '';
      var prefixes = ['NET_', 'SIG_', 'PIN_', 'N_'];
      var upper = netName.toUpperCase();
      for (var i = 0; i < prefixes.length; i++) {
        if (upper.indexOf(prefixes[i]) === 0) return netName.substring(prefixes[i].length);
      }
      return netName;
    }

    // 连接器类型分类
    function getConnectorType(name) {
      if (!name || typeof name !== 'string') return 'Unknown';
      var upper = name.toUpperCase();
      if (upper.indexOf('MOLEX') >= 0 || upper.indexOf('KK') >= 0) return 'Molex';
      if (upper.indexOf('JST') >= 0) return 'JST';
      if (upper.indexOf('HEADER') >= 0) return 'Header';
      if (upper.indexOf('USB') >= 0) return 'USB';
      return name;
    }

    // ===== 边类型常量 =====
    var EDGE_TYPES = {
      DIRECT: 'DIRECT',
      THROUGH_R: 'THROUGH_R',
      THROUGH_R_LOW: 'THROUGH_R_LOW',
      THROUGH_R_HIGH: 'THROUGH_R_HIGH',
      THROUGH_L: 'THROUGH_L',
      THROUGH_FB: 'THROUGH_FB',
      THROUGH_FUSE: 'THROUGH_FUSE',
      BLOCKED_BY_C: 'BLOCKED_BY_C',
      ISOLATED_BY_TRANSFORMER: 'ISOLATED_BY_TRANSFORMER',
      ISOLATED_BY_OPTO: 'ISOLATED_BY_OPTO',
      CONDITIONAL_BY_DIODE: 'CONDITIONAL_BY_DIODE',
      CONDITIONAL_BY_DIODE_DIR: 'CONDITIONAL_BY_DIODE_DIR',
      CONDITIONAL_BY_MOSFET: 'CONDITIONAL_BY_MOSFET',
      CONDITIONAL_BY_BJT: 'CONDITIONAL_BY_BJT',
      STOP_AT_IC: 'STOP_AT_IC',
      DISCONNECTED: 'DISCONNECTED'
    };

    // ===== 阻值解析函数 =====
    function parseResistorValue(valueStr) {
      if (!valueStr || typeof valueStr !== 'string') return null;
      var s = valueStr.trim().toUpperCase();
      // 去掉 Ω/Ohm 后缀
      s = s.replace(/[ΩΩ]/g, '').replace(/OHM/g, '').replace(/\s/g, '');
      // 0Ω / 0R
      if (s === '0' || s === '0R') return 0;
      var num = null;
      // MΩ
      if (/^\d+\.?\d*M$/.test(s)) { num = parseFloat(s.replace('M', '')) * 1000000; }
      // KΩ
      else if (/^\d+\.?\d*K$/.test(s)) { num = parseFloat(s.replace('K', '')) * 1000; }
      // 纯数字（Ω）
      else if (/^\d+\.?\d*$/.test(s)) { num = parseFloat(s); }
      // R 标记法 (4R7 = 4.7Ω)
      else if (/^\d+R\d+$/.test(s)) { num = parseFloat(s.replace('R', '.')); }
      // k 标记法 (4k7 = 4.7kΩ)
      else if (/^\d+K\d+$/.test(s)) { num = parseFloat(s.replace('K', '.')) * 1000; }
      return num;
    }

    // 根据阻值决定电阻的边类型
    function getResistorEdgeType(desig, props) {
      var valueStr = props.Value || props.Device_name || '';
      var ohms = parseResistorValue(valueStr);
      var deviceName = (props.Device_name || '').toUpperCase();
      // 0Ω/0R/跳线 → 直连
      if (ohms === 0 || deviceName.indexOf('0Ω') >= 0 || deviceName.indexOf('0R') >= 0 || deviceName.indexOf('JUMPER') >= 0) {
        return EDGE_TYPES.DIRECT;
      }
      if (ohms !== null) {
        if (ohms < 100) return EDGE_TYPES.THROUGH_R_LOW;   // < 100Ω: 近似连通
        if (ohms >= 10000) return EDGE_TYPES.THROUGH_R_HIGH; // >= 10KΩ: 断路
      }
      // 未知阻值或 100Ω~10KΩ: 条件性连通
      return EDGE_TYPES.THROUGH_R;
    }

    // 判断二极管引脚方向 (返回 { anodePin, cathodePin, anodeNet, cathodeNet })
    function getDiodePinDirection(pinInfoMap) {
      var anodePin = null, cathodePin = null;
      for (var pn in pinInfoMap) {
        var pinName = (pinInfoMap[pn].pinName || pinInfoMap[pn].name || '').toUpperCase();
        if (pinName === 'A' || pinName === 'ANODE' || pinName === '1') {
          if (!anodePin) anodePin = { pin: pn, net: normalizeNetName(pinInfoMap[pn].net), pinName: pinName };
        }
        if (pinName === 'K' || pinName === 'CATHODE' || pinName === 'C' || pinName === '2') {
          if (!cathodePin) cathodePin = { pin: pn, net: normalizeNetName(pinInfoMap[pn].net), pinName: pinName };
        }
      }
      return { anodePin: anodePin, cathodePin: cathodePin };
    }

    // ===== A类：直接穿透器件 =====
    var A_TYPE_PREFIXES = {
      'R': 'resistor',
      'L': 'inductor',
      'FB': 'ferrite_bead',
      'F': 'fuse'
    };

    // ===== B类：直接阻断器件 =====
    var B_TYPE_PREFIXES = {
      'C': 'capacitor'
    };

    // ===== 辅助函数：获取元件前缀 =====
    function getComponentPrefix(desig) {
      if (!desig || typeof desig !== 'string') return '';
      return desig.replace(/\d+$/, '').toUpperCase();
    }

    // 网络名标准化
    function normalizeNetName(net) {
      if (!net || typeof net !== 'string' || net === '(悬空)') return '';
      return net.trim().toUpperCase();
    }

    // 缓存机制 - 避免重复计算
    var graphCache = {
      netlistStr: null,
      data: null
    };

    function getCachedGraph(netlist) {
      var key = JSON.stringify(netlist).slice(0, 100);
      if (graphCache.netlistStr === key && graphCache.data) {
        console.log('[网表] 使用缓存网络图');
        return graphCache.data;
      }
      console.log('[网表] 计算新网络图');
      var result = buildNetworkConnectivityGraph(netlist);
      graphCache.netlistStr = key;
      graphCache.data = result;
      return result;
    }

    // 构建网络连通图（支持多类型桥接）- 优化版本
    function buildNetworkConnectivityGraph(netlist) {
      var components = netlist.components || netlist;
      var netMap = {};
      var bridges = [];
      var blocking = [];
      
      // 收集所有网络连接
      for (var cid in components) {
        var comp = components[cid];
        var props = comp.props || {};
        var desig = props.Designator || '';
        var pins = comp.pinInfoMap || {};
        for (var pn in pins) {
          var net = normalizeNetName(pins[pn].net);
          if (!net) continue;
          if (!netMap[net]) netMap[net] = [];
          netMap[net].push({ desig: desig, pin: pn });
        }
      }
      
      // 识别 A 类穿透器件 (R/L/FB/F) — 电阻分级判断
      for (var cid in components) {
        var comp = components[cid];
        var props = comp.props || {};
        var desig = props.Designator || '';
        var prefix = getComponentPrefix(desig);
        var deviceName = (props.Device_name || '').toUpperCase();

        // 检查是否是 A 类穿透器件
        var aType = A_TYPE_PREFIXES[prefix];
        if (aType || deviceName.indexOf('0Ω') >= 0 || deviceName.indexOf('0R') >= 0 || deviceName.indexOf('JUMPER') >= 0) {
          var pins = comp.pinInfoMap || {};
          var nets = [];
          for (var pn in pins) {
            var net = normalizeNetName(pins[pn].net);
            if (net) nets.push(net);
          }
          if (nets.length >= 2 && nets[0] !== nets[1]) {
            var edgeType;
            if (prefix === 'R') {
              // 电阻分级判断
              edgeType = getResistorEdgeType(desig, props);
            } else if (prefix === 'L') {
              edgeType = EDGE_TYPES.THROUGH_L;
            } else if (prefix === 'FB') {
              edgeType = EDGE_TYPES.THROUGH_FB;
            } else if (prefix === 'F') {
              edgeType = EDGE_TYPES.THROUGH_FUSE;
            } else {
              edgeType = EDGE_TYPES.DIRECT;
            }
            bridges.push({
              desig: desig,
              netA: nets[0],
              netB: nets[1],
              type: aType || 'jumper',
              edgeType: edgeType,
              value: props.Value || ''
            });
          }
        }
      }

      // 识别二极管 (D) — 通过 pinName 判断方向
      for (var cid in components) {
        var comp = components[cid];
        var props = comp.props || {};
        var desig = props.Designator || '';
        var prefix = getComponentPrefix(desig);

        if (prefix === 'D') {
          var dirInfo = getDiodePinDirection(comp.pinInfoMap || {});
          if (dirInfo.anodePin && dirInfo.cathodePin && dirInfo.anodePin.net && dirInfo.cathodePin.net) {
            if (dirInfo.anodePin.net !== dirInfo.cathodePin.net) {
              bridges.push({
                desig: desig,
                netA: dirInfo.anodePin.net,
                netB: dirInfo.cathodePin.net,
                type: 'diode_dir',
                edgeType: EDGE_TYPES.CONDITIONAL_BY_DIODE_DIR,
                value: props.Value || '',
                anodePin: dirInfo.anodePin.pin,
                cathodePin: dirInfo.cathodePin.pin,
                anodeNet: dirInfo.anodePin.net,
                cathodeNet: dirInfo.cathodePin.net
              });
            }
          } else {
            // 无 pinName 信息，保留旧逻辑（条件双向）
            var pins2 = comp.pinInfoMap || {};
            var nets2 = [];
            for (var pn2 in pins2) {
              var net2 = normalizeNetName(pins2[pn2].net);
              if (net2) nets2.push(net2);
            }
            if (nets2.length >= 2 && nets2[0] !== nets2[1]) {
              bridges.push({
                desig: desig,
                netA: nets2[0],
                netB: nets2[1],
                type: 'diode',
                edgeType: EDGE_TYPES.CONDITIONAL_BY_DIODE,
                value: props.Value || ''
              });
            }
          }
        }
      }

      // 识别三极管/MOSFET (Q) — 条件性连通，不加入 Union-Find
      for (var cid in components) {
        var comp = components[cid];
        var props = comp.props || {};
        var desig = props.Designator || '';
        var prefix = getComponentPrefix(desig);

        if (prefix === 'Q') {
          var pins3 = comp.pinInfoMap || {};
          var nets3 = [];
          for (var pn3 in pins3) {
            var net3 = normalizeNetName(pins3[pn3].net);
            if (net3) nets3.push(net3);
          }
          if (nets3.length >= 2) {
            // Q 的各引脚网络之间为条件性连通
            for (var qi = 0; qi < nets3.length; qi++) {
              for (var qj = qi + 1; qj < nets3.length; qj++) {
                if (nets3[qi] !== nets3[qj]) {
                  bridges.push({
                    desig: desig,
                    netA: nets3[qi],
                    netB: nets3[qj],
                    type: 'bjt',
                    edgeType: EDGE_TYPES.CONDITIONAL_BY_BJT,
                    value: props.Value || ''
                  });
                }
              }
            }
          }
        }
      }

      // 识别 B 类阻断器件 (C 电容)
      for (var cid in components) {
        var comp = components[cid];
        var props = comp.props || {};
        var desig = props.Designator || '';
        var prefix = getComponentPrefix(desig);
        
        if (prefix === 'C') {
          var pins = comp.pinInfoMap || {};
          var nets = [];
          for (var pn in pins) {
            var net = normalizeNetName(pins[pn].net);
            if (net) nets.push(net);
          }
          if (nets.length >= 2 && nets[0] !== nets[1]) {
            blocking.push({
              desig: desig,
              type: 'capacitor',
              netA: nets[0],
              netB: nets[1],
              edgeType: EDGE_TYPES.BLOCKED_BY_C
            });
          }
        }
      }
      
      // 并查集构建连通图 — 只有确定性连通才加入 Union-Find
      var parent = {};
      for (var net in netMap) { if (!parent[net]) parent[net] = net; }
      for (var bridge of bridges) {
        // 条件性连通和断路性桥接不加入 Union-Find
        if (bridge.edgeType === EDGE_TYPES.THROUGH_R_HIGH ||
            bridge.edgeType === EDGE_TYPES.CONDITIONAL_BY_DIODE ||
            bridge.edgeType === EDGE_TYPES.CONDITIONAL_BY_DIODE_DIR ||
            bridge.edgeType === EDGE_TYPES.CONDITIONAL_BY_BJT ||
            bridge.edgeType === EDGE_TYPES.BLOCKED_BY_C ||
            bridge.edgeType === EDGE_TYPES.STOP_AT_IC ||
            bridge.edgeType === EDGE_TYPES.ISOLATED_BY_TRANSFORMER ||
            bridge.edgeType === EDGE_TYPES.ISOLATED_BY_OPTO) {
          continue;
        }
        if (!parent[bridge.netA]) parent[bridge.netA] = bridge.netA;
        if (!parent[bridge.netB]) parent[bridge.netB] = bridge.netB;
        union(bridge.netA, bridge.netB);
      }
      
      function find(x) {
        if (!parent[x]) parent[x] = x;
        return parent[x] === x ? x : (parent[x] = find(parent[x]));
      }
      
      function union(a, b) {
        var ra = find(a), rb = find(b);
        if (ra !== rb) parent[ra] = rb;
      }
      
      for (var bridge of bridges) {
        union(bridge.netA, bridge.netB);
      }
      
      // BFS 查找桥接路径（返回边类型）
      function findBridgePath(netA, netB) {
        netA = normalizeNetName(netA);
        netB = normalizeNetName(netB);
        if (!netA || !netB) return { connected: false, edges: [], edgeType: null };
        if (netA === netB) return { connected: true, edges: [], edgeType: EDGE_TYPES.DIRECT };
        
        var visited = {};
        var queue = [{ net: netA, edges: [] }];
        visited[netA] = true;
        
        while (queue.length > 0) {
          var current = queue.shift();
          
          for (var bridge of bridges) {
            var nextNet = null;
            var newEdges = null;
            
            if (bridge.netA === current.net) {
              nextNet = bridge.netB;
              newEdges = [...current.edges, bridge];
            } else if (bridge.netB === current.net) {
              nextNet = bridge.netA;
              newEdges = [...current.edges, bridge];
            }
            
            if (nextNet && !visited[nextNet]) {
              if (nextNet === netB) {
                var lastEdge = newEdges[newEdges.length - 1];
                return { connected: true, edges: newEdges, edgeType: lastEdge ? lastEdge.edgeType : EDGE_TYPES.DIRECT };
              }
              visited[nextNet] = true;
              queue.push({ net: nextNet, edges: newEdges });
            }
          }
        }
        
        return { connected: false, edges: [], edgeType: null };
      }
      
      // 检查两个网络间是否有 B 类阻断器件
      function isBlockedBy(netA, netB) {
        netA = normalizeNetName(netA);
        netB = normalizeNetName(netB);
        if (!netA || !netB) return false;
        for (var i = 0; i < blocking.length; i++) {
          var b = blocking[i];
          if ((b.netA === netA && b.netB === netB) || (b.netA === netB && b.netB === netA)) {
            return true;
          }
        }
        return false;
      }
      
      // 获取连接类型
      function getConnectionType(netA, netB) {
        netA = normalizeNetName(netA);
        netB = normalizeNetName(netB);
        if (!netA || !netB) return { connected: false, edgeType: EDGE_TYPES.DISCONNECTED };
        
        if (netA === netB) return { connected: true, edgeType: EDGE_TYPES.DIRECT };
        
        var path = findBridgePath(netA, netB);
        if (path.connected) return { connected: true, edgeType: path.edgeType };
        
        if (isBlockedBy(netA, netB)) return { connected: false, edgeType: EDGE_TYPES.BLOCKED_BY_C };
        
        return { connected: false, edgeType: EDGE_TYPES.DISCONNECTED };
      }
      
      // 获取路径信息：检查路径是否经过电源/地网络（限制追踪深度）
      function getPathInfo(netA, netB) {
        netA = normalizeNetName(netA);
        netB = normalizeNetName(netB);

        var result = {
          passesThroughPower: false,
          passesThroughGnd: false,
          pathNets: [],
          connected: false
        };

        if (!netA || !netB) return result;

        // 网络名相同，直接返回
        if (netA === netB) {
          result.connected = true;
          result.pathNets = [netA];
          return result;
        }

        // BFS 遍历，限制深度为1跳（只检查直接连接）
        var visited = {};
        var queue = [{ net: netA, path: [netA], depth: 0 }];
        visited[netA] = true;

        while (queue.length > 0) {
          var current = queue.shift();

          // 找到目标
          if (current.net === netB) {
            result.connected = true;
            result.pathNets = current.path;
            break;
          }

          // 【新增】限制深度，只追踪1跳
          if (current.depth >= 1) continue;

          // 遍历桥接
          for (var bridge of bridges) {
            var nextNet = null;
            if (bridge.netA === current.net && !visited[bridge.netB]) {
              nextNet = bridge.netB;
            } else if (bridge.netB === current.net && !visited[bridge.netA]) {
              nextNet = bridge.netA;
            }

            if (nextNet && !visited[nextNet]) {
              visited[nextNet] = true;
              var newPath = current.path.concat([nextNet]);
              queue.push({ net: nextNet, path: newPath, depth: current.depth + 1 });
            }
          }
        }

        // 检查路径中的网络是否是电源/地
        for (var i = 0; i < result.pathNets.length; i++) {
          var netName = result.pathNets[i];
          // 跳过起点和终点（因为它们可能是信号网络）
          if (i > 0 && i < result.pathNets.length - 1) {
            if (isPwrNet(netName)) result.passesThroughPower = true;
            if (isGndNet(netName)) result.passesThroughGnd = true;
          }
        }

        return result;
      }
      
      // 递归检查某个网络最终连接到电源还是地（限制递归深度避免过度追踪）
      function getNetDestinationType(netName, visited, depth) {
        if (!netName) return 'signal';

        // 限制递归深度，只追踪1跳
        if (depth !== undefined && depth >= 1) return 'signal';

        visited = visited || {};
        if (visited[netName]) return 'signal';
        visited[netName] = true;

        // 自身是电源/地
        if (isPwrNet(netName)) return 'power';
        if (isGndNet(netName)) return 'gnd';

        // 遍历该网络通过桥接能到达的其他网络
        var result = 'signal';

        for (var bridge of bridges) {
          var nextNet = null;
          if (bridge.netA === netName && !visited[bridge.netB]) {
            nextNet = bridge.netB;
          } else if (bridge.netB === netName && !visited[bridge.netA]) {
            nextNet = bridge.netA;
          }

          if (nextNet) {
            // 传递 depth 参数，限制递归深度
            var destType = getNetDestinationType(nextNet, visited, (depth || 0) + 1);
            // 电源优先
            if (destType === 'power') return 'power';
            else if (destType === 'gnd' && result !== 'power') result = 'gnd';
          }
        }

        return result;
      }
      
      return { 
        netMap, 
        bridges, 
        blocking,
        findBridgePath, 
        getPathInfo: getPathInfo,
        getNetDestinationType: getNetDestinationType,
        isConnected: function(netA, netB) {
          return getConnectionType(netA, netB).connected;
        },
        getConnectionType: getConnectionType
      };
    }

    // ===== 三层电源网识别 =====

    // 第一层：排除表（这些名称不是电源，优先级最高）
    // 注意：移除 VSS/VEE，它们是常见地/负电源，不是控制信号
    var _pwrExcludeSet = {'EN':1,'ENABLE':1,'SHDN':1,'SHUTDOWN':1,'PGOOD':1,'PWROK':1,'POR':1,
      'UVLO':1,'OVLO':1,'ILIM':1,'MODE':1,'SYNC':1,'SS':1,'TRACK':1,'COMP':1,
      'FB':1,'VFB':1,'SENSE':1,'VSENSE':1,'ISENSE':1,'CS':1,'CSP':1,'CSN':1,
      'SW':1,'LX':1,'PH':1,'PHASE':1,'BOOT':1,'BST':1,'HGATE':1,'LGATE':1,
      'GATE':1,'DRV':1,'BSTCAP':1,'VREF':1,'VCM':1,'VMID':1,'MID':1,'NTC':1};

    // 地网精确名单（扩展版）
    var _gndExactSet = {'GND':1,'GROUND':1,'0V':1,'COM':1,'COMMON':1,
      'AGND':1,'DGND':1,'PGND':1,'SGND':1,'LGND':1,'EGND':1,'FGND':1,'MGND':1,'CGND':1,
      'CHASSIS':1,'CHASSIS_GND':1,'FRAME_GND':1,'SHIELD':1,'SHIELD_GND':1,'CASE_GND':1,
      'EARTH':1,'PE':1,'FG':1,'FRAME':1,'PROTECTIVE_EARTH':1,
      'SIGNAL_GND':1,'POWER_GND':1,'ANALOG_GND':1,'DIGITAL_GND':1,
      'GND_SENSE':1,'AGND_SENSE':1,'PGND_SENSE':1,'STAR_GND':1,
      'GND1':1,'GND2':1,'GND3':1,'GND4':1,'GND5':1,
      'GND_A':1,'GND_D':1,'GND_P':1,'GND_MCU':1,'GND_CPU':1,
      'GND_USB':1,'GND_HDMI':1,'GND_ETH':1,'GND_SD':1,'GND_RF':1,
      'GND_PLL':1,'GND_ADC':1,'GND_DAC':1,'GND_RTC':1};

    // 电源网精确名单（扩展版 - 包含电压值变体）
    var _pwrExactSet = {'VCC':1,'VDD':1,'VEE':1,'VSS':1,'VAA':1,'VPP':1,'VBUS':1,'VIN':1,'VOUT':1,
      'VSYS':1,'VMAIN':1,'VPWR':1,'PWR':1,'POWER':1,
      'VBAT':1,'VBATT':1,'BAT':1,'BATT':1,'BATTERY':1,'BPLUS':1,'RAW':1,'RAW_IN':1,
      'DCIN':1,'DC_IN':1,'ACIN':1,'AC_IN':1,'ADP':1,'ADAPTER':1,'EXT_PWR':1,'MAIN_PWR':1,'SYS_PWR':1,
      'VCORE':1,'VCPU':1,'VGPU':1,'VIO':1,'VDDIO':1,'VCCIO':1,'VCCA':1,'VCCD':1,'VDDA':1,'VDDD':1,
      'AVDD':1,'DVDD':1,'AVCC':1,'DVCC':1,'PVDD':1,'CVDD':1,'IVDD':1,'OVDD':1,
      'VPHY':1,'VPLL':1,'VCCAUX':1,'VCCINT':1,'VCCBRAM':1,'VCCADC':1,'VCCDAC':1,
      'VANA':1,'VDIG':1,'VLOGIC':1,'VAUX':1,'VRTC':1,'VBACKUP':1,'VBKUP':1,
      'VSTBY':1,'VSTANDBY':1,'VALW':1,'VAON':1,'VBIAS':1,'VREG':1,'VINT':1,
      'VDDQ':1,'VTT':1,'VTERM':1,'VPP_DDR':1,'VREF_DDR':1,
      'USB_VBUS':1,'USB_5V':1,'USB_PWR':1,'TYPEC_VBUS':1,'USBC_VBUS':1,'OTG_VBUS':1,
      'POE_VIN':1,'POE_48V':1,'HDMI_5V':1,'PCIE_12V':1,'M2_3V3':1,'SD_VDD':1,
      'VDD_CORE':1,'VDD_CPU':1,'VDD_SOC':1,'VDD_ARM':1,'VDD_GPU':1,'VDD_DRAM':1,'VDD_DDR':1,
      'VCC_A':1,'VCC_D':1,'VDDA_ADC':1,'VDDA_DAC':1,'AVDDH':1,'AVDDL':1,'DVDDH':1,'DVDDL':1,
      'VDD_TX':1,'VDD_RX':1,'VDD_SERDES':1,'VDD_PCIE':1,'VDD_USB':1,'VDD_MIPI':1,'VDD_HDMI':1,
      'VDD_ETH':1,'VDD_PHY':1,'VDD_SATA':1,'VDD_PLL':1,'VDD_DDR':1,
      'VIN_SYS':1,'VIN_MAIN':1,'VIN_AUX':1,'VIN_12V':1,'VIN_24V':1,
      'USB_VBUS':1,'VBUS_5V':1,'RTC_BAT':1,'COIN_BAT':1,'BACKUP_BAT':1,
      'VMINUS':1,'VNEG':1,'VNN':1,'VN':1,'VEE':1,
      'VCCINT':1,'VCCAUX':1,'VCCO':1,'VCC_BRAM':1,'VCC_PLL':1,'VCC_IO':1,
      'VVCC':1,'VVDD':1,
      // 常见电压值格式
